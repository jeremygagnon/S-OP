<style>
:root{
  --bg:#161a23;
  --panel:#1e2330;
  --panel-2:#191e29;
  --inset:#12161f;
  --ink:#f2f3f5;
  --ink-2:#c4c8d4;
  --muted:#878ea0;
  --faint:#565d72;
  --line:#2c3347;
  --line-2:#232a3a;
  --ctrl-bg:#313c58; --ctrl-bg-h:#3e4c70;
  --teal:#3ddc8a;
  --teal-bright:#5ee3a0;
  --lav:#a78bfa;
  --amber:#f0b73d;
  --coral:#ff6b5c;
  --accent:#ff7a3d;
  --pre:#5b9bf0;
  --ipr:#29c3d4;
  --vape:#f0b73d;
  --ext:#97cf3f;
  --flower:#e879b9;
  --accent-soft:#3a2316;
  --mark-grad:linear-gradient(150deg,#2a2017,#1c1410);
  --kpi-u-bg:#2a1d15; --kpi-u-bd:#48301d;
  --kpi-r-bg:#16271f; --kpi-r-bd:#244536;
  --kpi-c-bg:#201c2e; --kpi-c-bd:#352c4d;
  --chart-grid:rgba(255,255,255,.05);
  --chart-tick:#878ea0;
  --chart-axis:#2c3347;
  --chart-tip-bg:#1e2330;
  --chart-tip-border:#3d4660;
  --card-elev:inset 0 1px 0 rgba(255,255,255,.05),0 8px 24px rgba(0,0,0,.30);
  --card-elev-h:inset 0 1px 0 rgba(255,255,255,.08),0 18px 40px rgba(0,0,0,.42);
  --font:'Syne',-apple-system,system-ui,sans-serif;
  --mono:'DM Mono',ui-monospace,Menlo,monospace;
}
:root[data-theme="light"]{
  /* Dimmed "soft daylight" — surfaces pulled well below pure white to cut glare */
  --bg:#c7ccd4;
  --panel:#dce1e8;
  --panel-2:#d2d8e0;
  --inset:#c3cad3;
  --ink:#222b3a;
  --ink-2:#465162;
  --muted:#5d6776;
  --faint:#8992a0;
  --line:#b5bec9;
  --line-2:#c9d1db;
  --ctrl-bg:#e5eaf0; --ctrl-bg-h:#d6dfec;
  --teal:#1a7a4a;
  --teal-bright:#15824f;
  --lav:#7c3aed;
  --amber:#b87000;
  --coral:#c0392b;
  --accent:#e8622a;
  --pre:#1a5fa8;
  --ipr:#0e8a99;
  --vape:#b87000;
  --ext:#638f1c;
  --flower:#b83280;
  --accent-soft:#e3d3c8;
  --mark-grad:linear-gradient(150deg,#e3d3c8,#dbc6b7);
  --kpi-u-bg:#e5dad0; --kpi-u-bd:#d1bbaa;
  --kpi-r-bg:#d2e0d7; --kpi-r-bd:#b8d0c2;
  --kpi-c-bg:#d8d3ea; --kpi-c-bd:#c4bade;
  --chart-grid:rgba(15,23,42,.07);
  --chart-tick:#5b6675;
  --chart-axis:#b4bdc8;
  --chart-tip-bg:#dce1e8;
  --chart-tip-border:#b4bdc8;
  --card-elev:inset 0 1px 0 rgba(255,255,255,.5),0 6px 18px rgba(15,23,42,.09);
  --card-elev-h:inset 0 1px 0 rgba(255,255,255,.62),0 14px 30px rgba(15,23,42,.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;transition:background .2s ease,color .2s ease;}
body{padding:28px clamp(16px,3vw,40px) 64px;max-width:1320px;margin:0 auto;}
.mono{font-family:var(--mono);}
.pos{color:var(--teal-bright);} .neg{color:var(--coral);} .muted{color:var(--muted);} .faint{color:var(--faint);}

/* ---------- topbar ---------- */
.topbar{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:18px;padding-bottom:20px;margin-bottom:24px;border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:14px;}
.brand-logo{height:38px;width:auto;display:block;flex-shrink:0;}
.brand-div{width:1px;height:33px;background:var(--line);flex-shrink:0;}
.brand h1{font-size:26.5px;font-weight:600;letter-spacing:-0.01em;line-height:1.1;}
.period{display:flex;align-items:center;gap:14px;}
.seg-slider{position:relative;display:grid;grid-template-columns:repeat(var(--n),1fr);background:var(--ctrl-bg);border-radius:9px;padding:3px;border:1px solid var(--line);}
.seg-thumb{position:absolute;top:3px;bottom:3px;left:3px;width:calc((100% - 6px)/var(--n));border-radius:6px;background:var(--accent-soft);box-shadow:0 1px 2px rgba(0,0,0,.18);transform:translateX(calc(var(--i,0)*100%));transition:transform .24s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.seg{position:relative;z-index:1;font-size:12px;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--muted);font-family:var(--font);font-weight:500;transition:color .15s;text-align:center;white-space:nowrap;}
.seg:hover{color:var(--ink-2);}
.seg.active{color:var(--accent);}
.seg:disabled{cursor:not-allowed;color:var(--faint);opacity:.5;}
.seg:disabled:hover{color:var(--faint);}
#cmpGroup.hidden{display:none;}
#cmpGroup .seg,#yrGroup .seg{font-size:11px;padding:6px 9px;letter-spacing:0;} /* slimmer comparison/year segments so the control cluster sits beside the title, not below */
#modeGroup{margin-left:6px;} /* Sales / Operations / Planning mode switch, beside the title */
.theme-toggle{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--panel-2);color:var(--muted);display:grid;place-items:center;cursor:pointer;transition:color .15s,border-color .15s,background .15s;flex-shrink:0;}
.theme-toggle:hover{color:var(--ink);background:var(--accent-soft);}

/* ---------- confidential $ blur + unlock ---------- */
.cash{transition:filter .2s ease;}
body.cash-lock .cash{filter:blur(.4em);-webkit-filter:blur(.4em);user-select:none;-webkit-user-select:none;}
#cashToggle{color:var(--amber);width:auto;padding:0 9px;display:inline-flex;align-items:center;justify-content:center;gap:4px;}
body:not(.cash-lock) #cashToggle{color:var(--teal-bright);}
#cashToggle .cash-dollar{font-family:var(--mono);font-size:13px;font-weight:700;line-height:1;}
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:140;padding:24px;opacity:0;pointer-events:none;transition:opacity .16s;}
.pw-overlay.open{opacity:1;pointer-events:auto;}
.pw-modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:min(360px,100%);padding:22px 22px 20px;box-shadow:0 24px 64px rgba(0,0,0,.5);transform:translateY(10px) scale(.985);transition:transform .18s;}
.pw-overlay.open .pw-modal{transform:none;}
.pw-modal.shake{animation:pwshake .42s;}
@keyframes pwshake{10%,90%{transform:translateX(-2px);}20%,80%{transform:translateX(4px);}30%,50%,70%{transform:translateX(-7px);}40%,60%{transform:translateX(7px);}}
.pw-head{display:flex;align-items:center;gap:11px;}
.pw-ic{width:34px;height:34px;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;flex-shrink:0;}
.pw-title{font-size:15px;font-weight:600;color:var(--ink);letter-spacing:-0.01em;}
.pw-desc{font-size:11.5px;color:var(--muted);font-family:var(--mono);line-height:1.55;margin:9px 0 14px;}
.pw-input{width:100%;background:var(--inset,var(--panel-2));border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--ink);font-family:var(--mono);font-size:14px;letter-spacing:0.06em;outline:none;transition:border-color .14s;}
.pw-input:focus{border-color:var(--accent);}
.pw-err{font-size:11px;color:var(--coral);font-family:var(--mono);margin-top:8px;height:13px;opacity:0;transition:opacity .12s;}
.pw-err.show{opacity:1;}
.pw-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:15px;}
.pw-actions button{font-family:var(--font);font-size:13px;font-weight:600;border-radius:9px;padding:9px 16px;cursor:pointer;border:1px solid var(--line);transition:background .14s,border-color .14s,color .14s,filter .14s;}
.pw-cancel{background:transparent;color:var(--muted);}
.pw-cancel:hover{color:var(--ink);background:var(--panel-2);}
.pw-go{background:var(--accent);border-color:var(--accent);color:#fff;}
.pw-go:hover{filter:brightness(1.08);}

/* ---------- section heads ---------- */
.eyebrow{font-size:10px;color:var(--ink-2);font-weight:700;font-family:var(--mono);letter-spacing:0.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px;margin-bottom:14px;background:var(--panel-2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:9px 13px;}
.eyebrow.e-brand{background:rgba(91,155,240,.13);border-color:rgba(91,155,240,.30);border-left-color:var(--pre);color:var(--pre);}
.eyebrow.e-cat{background:rgba(240,183,61,.13);border-color:rgba(240,183,61,.30);border-left-color:var(--amber);color:var(--amber);}
.eyebrow.e-all{background:var(--accent-soft);border-color:var(--kpi-u-bd);border-left-color:var(--accent);color:var(--accent);}

/* ---------- KPI band ---------- */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px;}
.kpi-cell{display:flex;flex-direction:column;}
.kpi-name{font-size:11px;font-weight:700;font-family:var(--mono);letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-2);margin:0 0 12px 0;text-align:left;}
.kpi-name.tr{color:var(--teal-bright);}
.kpi-name.tu{color:var(--accent);}
.kpi-name.tc{color:var(--lav);}
.kpi{background:var(--panel);border:1px solid transparent;border-radius:16px;padding:18px 20px;position:relative;overflow:hidden;box-shadow:var(--card-elev);}
.kpi .big{font-size:40px;font-weight:700;font-family:var(--mono);line-height:0.95;letter-spacing:-0.01em;color:var(--ink);}
.kpi .big .unit{font-size:15px;color:var(--faint);font-weight:400;margin-left:5px;}
.kpi .sub{font-size:11px;font-family:var(--mono);color:var(--muted);}
.kpi-cmp{display:flex;align-items:flex-end;gap:14px;}
.kpi-cmp .cmp-side{display:flex;flex-direction:column;gap:4px;}
.kpi-cmp .cmp-mon{font-size:11px;font-weight:600;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.05em;}
.kpi-cmp .cmp-val{font-size:32px;font-weight:700;font-family:var(--mono);line-height:0.95;letter-spacing:-0.01em;color:var(--ink);}
.kpi-cmp .cmp-arrow{font-size:20px;color:var(--faint);font-weight:400;padding-bottom:3px;}
.kpi-foot{margin-top:12px;font-family:var(--mono);text-align:center;}
.kpi-foot .pct{font-size:22px;font-weight:700;}
.kpi.ku{background:var(--kpi-u-bg);}
.kpi.kr{background:var(--kpi-r-bg);}
.kpi.kc{background:var(--kpi-c-bg);}

/* ---------- product performance ---------- */
.prod-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-bottom:30px;}
.prod-row>.prod:last-child:nth-child(odd){grid-column:1 / -1;justify-self:center;width:calc(50% - 7px);}
.prod{background:var(--panel);border:1px solid transparent;border-radius:16px;padding:16px 18px;min-width:0;box-shadow:var(--card-elev);}
.prod-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:15px;}
.prod-name{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink);}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.chip{font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:5px;letter-spacing:0.02em;white-space:nowrap;}
.chip.over{background:rgba(61,220,138,.14);color:var(--teal-bright);}
.chip.near{background:rgba(240,183,61,.14);color:var(--amber);}
.chip.under{background:rgba(255,107,92,.14);color:var(--coral);}
.chip.nu{background:rgba(135,142,160,.12);color:var(--muted);}
.prod-att{font-size:30px;font-weight:600;font-family:var(--mono);line-height:1;letter-spacing:-0.01em;}
.prod-att .of{font-size:11px;color:var(--faint);font-family:var(--mono);font-weight:400;letter-spacing:0;}
.prod-bar{margin-top:13px;height:8px;border-radius:5px;background:var(--inset);position:relative;overflow:hidden;}
.prod-bar .fill{position:absolute;left:0;top:0;height:100%;border-radius:5px;opacity:.9;}
.prod-bar .plan{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--ink-2);opacity:.6;}
.prod-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:13px;padding-top:13px;border-top:1px solid var(--line-2);}
.prod-nums .col .k{font-size:10px;color:var(--ink-2);font-family:var(--mono);font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}
.prod-nums .col .vv{font-size:19px;color:var(--ink);font-family:var(--mono);font-weight:600;margin-top:5px;}
.prod-nums .col.mid{text-align:center;}
.prod-nums .col:last-child{text-align:right;}
.mom-spark{position:relative;width:100%;height:118px;margin-bottom:13px;}
.spark-leg{display:flex;gap:16px;margin:-6px 0 12px;font-size:9.5px;font-family:var(--mono);color:var(--ink-2);letter-spacing:0.04em;text-transform:uppercase;}
.spark-leg span{display:inline-flex;align-items:center;gap:6px;}
.spark-leg i{width:15px;border-top:2px solid;display:inline-block;}
.spark-leg i.dash{border-top-style:dashed;border-top-width:1.5px;}

/* ---------- exec-summary brand strip ---------- */
.ov-brands{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-bottom:30px;}
.ov-brand{display:flex;flex-direction:column;align-items:center;text-align:center;gap:11px;background:var(--panel);border:1px solid transparent;border-radius:14px;padding:18px 11px;cursor:pointer;font-family:var(--font);box-shadow:var(--card-elev);transition:background .14s,box-shadow .18s,transform .18s;}
.ov-brand:hover{background:var(--panel-2);box-shadow:var(--card-elev-h);transform:translateY(-2px);}
.ovb-top{height:26px;display:flex;align-items:center;justify-content:center;}
.ovb-logo{max-height:26px;max-width:98px;width:auto;object-fit:contain;display:block;}
.ovb-word{font-family:var(--mono);font-weight:800;font-size:13px;letter-spacing:0.04em;color:#6ec78a;}
.ovb-rev{font-size:21px;font-weight:700;font-family:var(--mono);line-height:1;letter-spacing:-0.01em;color:var(--ink);white-space:nowrap;}
.ovb-foot{display:flex;flex-direction:column;align-items:center;gap:8px;}
.ovb-u{font-size:10px;font-family:var(--mono);color:var(--muted);white-space:nowrap;}

/* in-progress strip */
.inprog{display:flex;align-items:center;gap:11px;background:var(--panel-2);border:1px solid transparent;border-radius:12px;padding:11px 16px;margin-bottom:30px;font-size:12px;color:var(--ink-2);box-shadow:var(--card-elev);}
.inprog .tag{font-size:9px;font-family:var(--mono);letter-spacing:0.1em;text-transform:uppercase;color:var(--amber);background:rgba(240,183,61,.14);padding:3px 8px;border-radius:5px;}
.inprog b{font-family:var(--mono);color:var(--ink);font-weight:500;}
.ops-ph{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--panel-2);border:1px solid transparent;border-radius:14px;padding:16px 18px;margin-bottom:24px;box-shadow:var(--card-elev);}
.ops-ph .ph-d{font-size:12px;color:var(--muted);line-height:1.45;max-width:64ch;}
.ops-ph .ph-chip{flex:0 0 auto;font-size:9px;font-family:var(--mono);letter-spacing:0.12em;text-transform:uppercase;color:var(--amber);background:rgba(240,183,61,.14);padding:5px 10px;border-radius:6px;white-space:nowrap;}

/* ---------- legend ---------- */
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:18px;}
.leg{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);font-family:var(--mono);}
.leg-sq{width:11px;height:3px;border-radius:2px;flex-shrink:0;}

/* ---------- app layout + sidebar nav ---------- */
.layout{display:grid;grid-template-columns:214px minmax(0,1fr);gap:24px;align-items:start;}
.sidebar{position:sticky;top:20px;}
.nav-ver{font-size:10px;color:var(--faint);font-family:var(--mono);letter-spacing:0.1em;text-align:center;padding:11px 0 2px;}
.nav-credit{font-size:10px;color:var(--faint);font-family:var(--mono);letter-spacing:0.06em;text-align:center;padding:0 0 4px;opacity:.8;}
.nav{display:flex;flex-direction:column;gap:3px;background:var(--panel);border:1px solid transparent;border-radius:16px;padding:10px;box-shadow:var(--card-elev);}
.nav-sec{font-size:11px;color:var(--ink);font-weight:700;font-family:var(--mono);letter-spacing:0.1em;text-transform:uppercase;padding:7px 11px;margin:13px 0 6px;background:var(--panel-2);border-left:3px solid var(--accent);border-radius:7px;}
.nav-sec.first{margin-top:2px;}
.nav-item{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;background:transparent;border:none;cursor:pointer;border-radius:9px;padding:9px 11px;color:var(--ink-2);font-family:var(--font);font-weight:500;transition:background .14s,color .14s;}
.nav-item:hover{background:var(--panel-2);color:var(--ink);}
.nav-item.active{background:var(--accent-soft);}
.nav-item.active .ni-name{color:var(--accent);}
.ni-name{font-size:15px;display:flex;align-items:center;gap:8px;}
.ni-tag{font-size:8px;font-family:var(--mono);letter-spacing:0.06em;text-transform:uppercase;color:var(--amber);background:rgba(240,183,61,.14);padding:2px 5px;border-radius:4px;}
.ni-logo{max-height:27px;max-width:150px;width:auto;object-fit:contain;display:block;}
.ni-word{font-family:var(--mono);font-weight:800;font-size:14px;letter-spacing:0.08em;color:#6ec78a;}
.page-logo{max-height:44px;max-width:290px;width:auto;object-fit:contain;display:block;}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:12px 16px;margin-bottom:16px;flex-wrap:wrap;}
.page-title{font-size:19px;font-weight:600;letter-spacing:-0.01em;display:flex;align-items:center;gap:10px;}
.page-title svg{color:var(--accent);}
.ctrl-box{display:flex;flex-direction:row;align-items:center;justify-content:flex-end;gap:14px;background:var(--panel-2);border:1px solid transparent;border-radius:12px;padding:8px 12px;flex-shrink:0;flex-wrap:wrap;box-shadow:var(--card-elev);}
.mon-btns{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap;}
.mon-btns-lbl{font-size:9px;color:var(--faint);font-family:var(--mono);letter-spacing:0.09em;text-transform:uppercase;margin-right:2px;}
.mon-slider .seg{font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:0.02em;line-height:1;padding:7px 9px;}

/* ---------- month cards ---------- */
.month-list{display:flex;flex-direction:column;gap:16px;}
.month-card{background:var(--panel);border:1px solid transparent;border-radius:16px;overflow:hidden;box-shadow:var(--card-elev);}
.mc-head{background:var(--panel-2);padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.mc-name{font-size:16px;font-weight:600;display:flex;align-items:center;gap:9px;}
.mc-name svg{color:var(--accent);}
.badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.month-card.collapsible>.mc-head{cursor:pointer;user-select:none;}
.month-card.collapsible>.mc-head:hover .mc-caret{color:var(--ink-2);}
.mc-caret{display:inline-flex;align-items:center;color:var(--muted);transition:transform .18s ease;}
.month-card.collapsed>.mc-head{border-bottom:none;}
.month-card.collapsed .mc-caret{transform:rotate(-90deg);}
.month-card.collapsed .cat-collapse{display:none;}
.tb{font-size:10px;font-family:var(--mono);padding:4px 9px;border-radius:6px;letter-spacing:0.02em;}
.tb-vol{background:rgba(167,139,250,.14);color:var(--lav);}
.tb-up{background:rgba(61,220,138,.14);color:var(--teal-bright);}
.tb-dn{background:rgba(255,107,92,.14);color:var(--coral);}
.tb-nu{background:rgba(135,142,160,.12);color:var(--muted);}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-bottom:1px solid var(--line);}
.stat{background:var(--panel);padding:15px 20px;}
.stat .k{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;}
.stat .v{font-size:25px;font-weight:600;font-family:var(--mono);line-height:1;letter-spacing:-0.01em;}
.stat .v.teal{color:var(--teal);} .stat .v.lav{color:var(--lav);} .stat .v.amber{color:var(--amber);}
.stat .s{font-size:11px;font-family:var(--mono);margin-top:7px;color:var(--muted);}

/* ---------- category page ---------- */
.cat-sec{padding:17px 20px;border-top:1px solid var(--line-2);}
.cat-sec:first-child{border-top:none;}
.cat-chart-wide{position:relative;width:100%;height:230px;}
.mtable{border-top:1px solid var(--line);}
.mrow{display:grid;gap:12px;padding:13px 20px;border-top:1px solid var(--line-2);align-items:center;}
.mrow:first-child{border-top:none;}
.mrow.head{padding:11px 20px;}
.mrow.head>div{font-size:9px;color:var(--faint);font-family:var(--mono);letter-spacing:0.06em;text-transform:uppercase;}
.mrow.head>div:not(:first-child){text-align:right;}
.mc-month{font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px;}
.mc-month .ni-tag{margin-left:2px;}
.mc-cell{font-size:14px;font-family:var(--mono);font-weight:500;text-align:right;}
.mc-cell.teal{color:var(--teal);} .mc-cell.lav{color:var(--lav);}
.mc-dual{display:flex;flex-direction:column;align-items:flex-end;gap:2px;line-height:1.15;white-space:nowrap;}
.mc-dual .mc-sub{font-size:10.5px;color:var(--faint);font-weight:400;letter-spacing:0.01em;white-space:nowrap;}
.mtable-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.mtable-scroll .mtable{min-width:920px;}
.skf-d{display:flex;flex-direction:column;gap:1px;min-width:0;line-height:1.22;}
.skf-d small{font-size:10px;color:var(--faint);font-family:var(--mono);font-weight:400;letter-spacing:0.02em;}
.skf-tot{border-top:1.5px solid var(--line);}
.skf-tot .mc-month{color:var(--muted);font-weight:600;}
/* day-by-day production schedule */
.sched-day{margin-top:18px;}
.sched-day:first-of-type{margin-top:0;}
.sd-head{display:flex;align-items:baseline;gap:11px;padding:0 4px 9px;}
.sd-date{font-size:15px;font-weight:600;color:var(--ink);}
.sd-dow{font-family:var(--mono);font-size:10.5px;color:var(--accent);letter-spacing:0.05em;text-transform:uppercase;}
.sd-cnt{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-left:auto;}
.sched-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.stable{min-width:1040px;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--card-elev);}
.srow{display:grid;grid-template-columns:58px minmax(168px,1.6fr) minmax(116px,1.12fr) 86px minmax(108px,1fr) 96px 42px 96px;gap:13px;padding:11px 16px;border-top:1px solid var(--line-2);align-items:start;}
.srow:first-child{border-top:none;}
.srow.head{background:var(--panel-2);padding:9px 16px;}
.srow.head>div{font-size:9px;color:var(--faint);font-family:var(--mono);letter-spacing:0.06em;text-transform:uppercase;}
.srow.head>div.r{text-align:right;}
.s-sku{font-family:var(--mono);font-size:12px;color:var(--ink-2);font-weight:500;}
.s-desc{font-size:12.5px;color:var(--ink);line-height:1.32;}
.s-lot{font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.38;word-break:break-word;}
.s-out{font-family:var(--mono);font-size:11px;color:var(--teal);line-height:1.38;word-break:break-word;}
.s-qty{font-family:var(--mono);font-size:12px;color:var(--ink-2);text-align:right;line-height:1.38;word-break:break-word;}
.s-prov{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;}
.s-st{font-size:8.5px;font-family:var(--mono);padding:3px 7px;border-radius:5px;letter-spacing:0.03em;white-space:nowrap;justify-self:start;text-transform:uppercase;}
.st-prog{background:rgba(61,220,138,.16);color:var(--teal-bright);}
.st-firm{background:rgba(255,122,61,.16);color:var(--accent);}
.st-staged{background:rgba(167,139,250,.16);color:var(--lav);}
.st-board{background:rgba(135,142,160,.14);color:var(--muted);}
.st-planned{background:rgba(135,142,160,.08);color:var(--faint);}
/* batch / lot process-stage schedules (Sparling) */
.stream-head{display:flex;align-items:center;gap:10px;margin:28px 0 14px;padding-bottom:10px;border-bottom:1px solid var(--line);}
.stream-head:first-of-type{margin-top:2px;}
.stream-title{font-size:17px;font-weight:600;display:flex;align-items:center;gap:9px;}
.stream-sub{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-left:auto;}
.b-code{font-family:var(--mono);font-size:10.5px;color:var(--faint);font-weight:400;margin-left:9px;letter-spacing:0.01em;}
.ptable{background:transparent;}
.prow{display:grid;gap:12px;padding:10px 18px;border-top:1px solid var(--line-2);align-items:center;}
.prow:first-child{border-top:none;}
.prow.head{background:var(--panel-2);padding:8px 18px;}
.prow.head>div{font-size:9px;color:var(--faint);font-family:var(--mono);letter-spacing:0.06em;text-transform:uppercase;}
.prow.head>div.r{text-align:right;}
.p-stage{font-size:12.5px;color:var(--ink);line-height:1.3;}
.p-date{font-family:var(--mono);font-size:11.5px;color:var(--muted);white-space:nowrap;}
.p-kg{font-family:var(--mono);font-size:12.5px;color:var(--ink-2);text-align:right;white-space:nowrap;}
.p-kg.teal{color:var(--teal);}
.spar-toggle{max-width:380px;margin-bottom:20px;}
.spar-pane.hidden{display:none;}

/* ---------- month-over-month panel ---------- */
.mom-analysis{margin-bottom:16px;}
.mom-2col{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.05fr);gap:22px;align-items:stretch;padding:18px 20px 20px;}
.mom-compare{display:flex;flex-direction:column;justify-content:center;}
.cmp-tbl{display:grid;grid-template-columns:auto 1fr auto 1fr auto;gap:0 10px;align-items:center;}
.cmp-tbl>div{padding:16px 0;}
.cmp-tbl>div:nth-child(n+6){border-top:1px solid var(--line-2);}
.cmp-h{font-size:13px;color:var(--ink-2);font-weight:700;font-family:var(--mono);letter-spacing:0.05em;text-transform:uppercase;padding-bottom:6px!important;padding-top:0!important;text-align:center;}
.cmp-lbl{font-size:18px;color:var(--ink);font-weight:800;font-family:var(--mono);letter-spacing:0.03em;text-transform:uppercase;text-align:left;white-space:nowrap;margin:0 14px 0 0;}
.cmp-v{font-size:25px;font-weight:700;font-family:var(--mono);line-height:1;letter-spacing:-0.01em;color:var(--ink);text-align:center;}
.cmp-v.sm{font-size:22px;}
.cmp-arr{text-align:center;color:var(--faint);font-size:20px;font-family:var(--mono);}
.cmp-dcell{text-align:center;}
.mom-chip{font-size:14px;font-family:var(--mono);font-weight:700;color:var(--muted);display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:7px;}
.mom-chip.pos{background:rgba(61,220,138,.15);color:var(--teal-bright);}
.mom-chip.neg{background:rgba(255,107,92,.15);color:var(--coral);}
.mom-chartbox{display:flex;flex-direction:column;justify-content:center;}
.mom-chart-h{position:relative;width:100%;height:195px;}
.mom-cap{font-size:9px;color:var(--faint);font-family:var(--mono);text-align:center;margin-top:9px;letter-spacing:0.04em;}
.ocs-sig{display:flex;justify-content:space-between;gap:8px;font-family:var(--mono);font-size:9.5px;color:var(--muted);border-top:1px solid var(--line);margin-top:10px;padding-top:9px;letter-spacing:0.02em;}
.ocs-sig b{font-weight:600;}

/* ---------- vs Forecast panel (forecast vs sold for the focused month) ---------- */
.fcst-outlook{margin-bottom:16px;}
.fc-single{padding:18px 20px 20px;}
.fc-side-h{font-size:11px;font-family:var(--mono);letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:13px;}
.fc-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
.fc-metric{border:1px solid transparent;border-radius:12px;padding:13px 15px;background:var(--panel-2,rgba(255,255,255,.015));display:flex;flex-direction:column;gap:6px;box-shadow:var(--card-elev);}
.fc-k{font-size:10px;font-family:var(--mono);letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);}
.fc-val{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1;letter-spacing:-0.01em;color:var(--ink);}
.fc-metric .mom-chip{align-self:flex-start;}

/* ---------- per-brand MoM panel ---------- */
.brand-mom{margin-bottom:16px;}
.brand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px;padding:18px 20px 20px;}
.brand-box{border:1px solid transparent;border-radius:14px;padding:13px 15px 8px;background:var(--panel-2,rgba(255,255,255,.015));display:flex;flex-direction:column;box-shadow:var(--card-elev);}
.brand-cap{height:48px;display:flex;align-items:center;justify-content:center;padding:2px 4px;margin-bottom:13px;border-radius:9px;transition:transform .12s,background .12s;position:relative;}
.brand-cap[role="button"]{cursor:pointer;}
.brand-cap[role="button"]:hover,.brand-cap[role="button"]:focus-visible{transform:translateY(-1px);background:rgba(127,127,127,.08);outline:none;}
.brand-cap[role="button"]::after{content:"⤢";position:absolute;top:1px;right:5px;font-size:12px;font-weight:700;color:var(--faint);opacity:0;transition:opacity .12s;}
.brand-cap[role="button"]:hover::after,.brand-cap[role="button"]:focus-visible::after{opacity:1;}
.brand-cap img{max-height:40px;max-width:100%;width:auto;object-fit:contain;display:block;}
.brand-word{font-family:var(--mono);font-weight:800;font-size:18px;letter-spacing:0.1em;line-height:1;color:#6ec78a;display:flex;flex-direction:column;align-items:center;gap:3px;}
.brand-word small{font-size:7px;font-weight:600;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;}
.brand-metric{display:grid;grid-template-columns:50px 1fr auto;align-items:center;gap:9px;padding:8px 2px;border-top:1px solid var(--line-2);}
.brand-metric:first-of-type{border-top:none;}
.bm-lbl{font-size:9px;font-family:var(--mono);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.bm-vals{font-size:12.5px;font-family:var(--mono);font-weight:600;color:var(--ink);text-align:right;white-space:nowrap;}
.bm-vals .arr{color:var(--faint);margin:0 4px;font-weight:400;}
.mom-chip.xs{font-size:11px;padding:3px 7px;border-radius:6px;}
.mom-chip.flat{background:var(--accent-soft);color:var(--muted);}

/* ---------- SKU drill-down modal ---------- */
.sku-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:120;padding:24px;opacity:0;pointer-events:none;transition:opacity .16s;}
.sku-overlay.open{opacity:1;pointer-events:auto;}
.sku-modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:min(1040px,100%);max-height:86vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5);transform:translateY(10px) scale(.985);transition:transform .18s;}
.sku-overlay.open .sku-modal{transform:none;}
.sku-head{display:flex;align-items:center;gap:15px;padding:17px 22px;border-bottom:1px solid var(--line);background:var(--panel-2);}
.sku-head .cap{height:40px;display:flex;align-items:center;}
.sku-head .cap img{max-height:40px;max-width:190px;object-fit:contain;display:block;}
.sku-head .cap .brand-word{font-size:20px;align-items:flex-start;}
.sku-titles{display:flex;flex-direction:column;gap:3px;}
.sku-cat{font-size:13px;font-weight:700;color:var(--ink);font-family:var(--mono);letter-spacing:0.02em;}
.sku-sub{font-size:9.5px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.sku-close{margin-left:auto;width:34px;height:34px;flex-shrink:0;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;font-size:16px;line-height:1;display:grid;place-items:center;transition:color .12s,background .12s;}
.sku-close:hover{color:var(--ink);background:var(--accent-soft);}
.sku-body{overflow:auto;}
.sku-row{display:grid;grid-template-columns:1.3fr repeat(3,1fr);gap:10px;padding:12px 22px;border-top:1px solid var(--line-2);align-items:center;}
.sku-row.head{position:sticky;top:0;background:var(--panel);border-top:none;padding-top:13px;padding-bottom:11px;}
.sku-row.head>div{font-size:9px;color:var(--faint);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.06em;}
.sku-row.head>div:not(:first-child),.sku-v{text-align:right;}
.sku-row.head small{display:block;font-size:8px;color:var(--faint);opacity:.8;margin-top:2px;}
.sku-row.foot{border-top:1px solid var(--line);background:var(--panel-2);position:sticky;bottom:0;}
.sku-desc{font-size:12px;color:var(--ink);font-weight:500;line-height:1.3;}
.sku-desc small{display:block;color:var(--faint);font-family:var(--mono);font-size:9px;margin-top:2px;letter-spacing:0.04em;}
.sku-v{font-family:var(--mono);font-size:13px;font-weight:500;white-space:nowrap;display:flex;flex-direction:row;align-items:center;justify-content:flex-end;gap:6px;}
.sku-v .prv{font-weight:500;color:var(--faint);}
.sku-v .arr{color:var(--faint);font-size:11px;font-weight:400;}
.sku-v .mm{margin-left:3px;}
.sku-v.rev{color:var(--teal);} .sku-v.un{color:var(--accent);} .sku-v.cs{color:var(--lav);}
.sku-v.foot,.sku-desc.foot{font-weight:700;color:var(--ink);}
@media(max-width:560px){
  .sku-row{grid-template-columns:1.1fr 1fr 1fr;}
  .sku-row .cs{display:none;}
  .sku-v{font-size:11px;gap:4px;}
}

.footnote{margin-top:26px;padding-top:16px;border-top:1px solid var(--line-2);font-size:11px;color:var(--faint);font-family:var(--mono);line-height:1.7;}

@media(max-width:1180px){
  .ov-brands{grid-template-columns:repeat(4,1fr);}
}
@media(max-width:920px){
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .prod-row{grid-template-columns:repeat(2,1fr);}
  .ov-brands{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:760px){
  .layout{grid-template-columns:1fr;gap:16px;}
  .sidebar{position:static;}
  .nav{flex-direction:row;overflow-x:auto;gap:6px;padding:8px;}
  .nav-sec{display:none;}
  .nav-item{flex-direction:column;align-items:flex-start;gap:4px;white-space:nowrap;}
}
@media(max-width:600px){
  body{padding:18px 14px 48px;overflow-x:hidden;}
  .brand-logo{height:30px;}
  .brand-div{height:26px;}
  .brand h1{font-size:20px;}
  .kpi-row,.prod-row{grid-template-columns:1fr;}
  .prod-row>.prod:last-child:nth-child(odd){grid-column:auto;justify-self:stretch;width:auto;}
  .ov-brands{grid-template-columns:repeat(2,1fr);}
  .stat-row{grid-template-columns:1fr 1fr;}
  .mrow{gap:7px;padding:11px 13px;}
  .mc-cell,.mc-month{font-size:12px;}
  .mom-2col{grid-template-columns:1fr;padding:16px 14px 18px;}
  /* controls span the row; month strip scrolls horizontally instead of overflowing */
  .page-head{gap:12px;}
  .ctrl-box{width:100%;justify-content:flex-start;gap:10px;}
  .mon-btns{width:100%;justify-content:flex-start;}
  .mon-slider{grid-template-columns:repeat(12,1fr);width:100%;}
  .mon-slider .seg{padding:8px 1px;font-size:10px;letter-spacing:0;}
  /* denser month-over-month compare table */
  .cmp-tbl{gap:0 6px;}
  .cmp-tbl>div{padding:11px 0;}
  .cmp-h{font-size:11px;}
  .cmp-lbl{font-size:12px;margin-right:6px;letter-spacing:0.02em;}
  .cmp-v{font-size:16px;}
  .cmp-v.sm{font-size:14px;}
  .cmp-arr{font-size:13px;}
  .mom-chip{font-size:11px;padding:4px 6px;}
  /* KPI numbers fit a single phone column */
  .kpi{padding:16px;}
  .kpi .big{font-size:34px;}
  .kpi-cmp{gap:10px;}
  .kpi-cmp .cmp-val{font-size:26px;}
  /* SKU modal uses more of the narrow viewport */
  .sku-overlay{padding:12px;}
  .sku-head{padding:14px 16px;gap:12px;}
  .sku-row{padding:11px 16px;}
}
@media(max-width:380px){
  .kpi{padding:14px;}
  .kpi .big{font-size:30px;}
  .kpi-cmp{gap:8px;}
  .kpi-cmp .cmp-val{font-size:23px;}
  .cmp-tbl{gap:0 5px;}
  .cmp-lbl{font-size:11px;margin-right:5px;}
  .cmp-v{font-size:15px;}
  .cmp-v.sm{font-size:13px;}
  .cmp-arr{font-size:12px;}
  .mom-chip{font-size:10px;padding:3px 5px;}
  .mon-slider .seg{font-size:9px;}
  .ovb-rev{font-size:19px;}
  .stat .v{font-size:22px;}
  .prod-att{font-size:26px;}
}
/* ---- data export (Excel / PDF) ---- */
.head-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end;}
#exportSlot{display:inline-flex;}
#exportSlot.hidden{display:none;}
.exp-box{display:inline-flex;align-items:center;gap:5px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:4px 5px;flex-shrink:0;}
.exp-btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;font-weight:500;letter-spacing:.01em;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer;transition:border-color .15s,color .15s,background .15s;}
.exp-btn:hover{border-color:var(--accent);color:var(--accent);}
.exp-btn svg{width:15px;height:15px;flex-shrink:0;}
.exp-btn span{line-height:1;}
@media(max-width:600px){
  .head-right{width:100%;}
}
/* ---- print / PDF export surface ---- */
#printArea{display:none;}
@media print{
  body.printing{background:#fff;}
  body.printing>*{display:none !important;}
  body.printing>#printArea{display:block !important;color:#111;font-family:Arial,Helvetica,sans-serif;}
  #printArea .pa-title{font-size:18px;font-weight:700;margin:0 0 2px;}
  #printArea .pa-sub{font-size:11px;color:#555;margin:0 0 14px;}
  #printArea table{border-collapse:collapse;width:100%;font-size:11px;}
  #printArea th,#printArea td{border:1px solid #ccc;padding:5px 8px;text-align:right;}
  #printArea th{background:#f0f0f0;font-weight:700;}
  #printArea .c-text{text-align:left;}
  #printArea tr.pa-foot td{font-weight:700;border-top:2px solid #888;background:#fafafa;}
  @page{margin:14mm;}
}
</style>

const FCAST_FLOOR=100; // below this a "forecast" cell is a broken source formula, not a real plan (also guarded relatively in hasF)

const charts=[];
function fmtN(v){if(v==null)return'—';return Math.round(v).toLocaleString();}
function fmtK(v){if(v==null)return'—';const a=Math.abs(v);if(a>=1e6)return(v/1e6).toFixed(2)+'M';if(a>=1000)return(v/1000).toFixed(1)+'k';return Math.round(v).toString();}
function fmtMoney(v){if(v==null)return'—';return '$'+Math.round(v).toLocaleString();}
function fmtMoneyK(v){if(v==null)return'—';return '<span class="cash">$'+fmtK(v)+'</span>';}
function hexA(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function signPct(v){if(v==null)return'—';return(v>=0?'+':'')+Math.round(v)+'%';}
function hasF(yr,key,mon){const d=DATA[yr]?.[key]?.[mon];if(!d)return false;const f=d.f||0;return f>=FCAST_FLOOR&&f>=0.15*(d.s||0);} // reject broken partials (tiny fcst vs large sold)
function completeMonths(yr){const s=STATUS[yr];return s?MONTHS.filter(m=>s[m]==='c'):[];}
// Resolve the comparison pair for a list of complete months, honoring the selected button (defaults to the latest).
function momPair(list,yr){
  let i=selMonth?list.indexOf(selMonth):-1;
  if(i<0)i=list.length-1; // default: latest complete month
  let pm=null,pmYr=null;
  if(i>0){pm=list[i-1];pmYr=String(yr);}
  else if(yr!=null){ // first month of the list — reach back to the prior year's last complete month (e.g. Jan 2026 → Dec 2025)
    const py=String(Number(yr)-1),pcm=completeMonths(py);
    if(pcm.length){pm=pcm[pcm.length-1];pmYr=py;}
  }
  return {lm:list[i],pm,pmYr,idx:i};
}
// Render the prior month with its year only when it crosses a year boundary, e.g. "Dec ’25".
function pmLabel(pm,pmYr,yr){return (pm&&pmYr&&String(pmYr)!==String(yr))?`${mf(pm)} ’${String(pmYr).slice(-2)}`:mf(pm);}
// Resolve the comparison "prior" pointer honoring the active mode:
//   mom = the prior complete month · yoy = the same month one year earlier.
function cmpPair(list,yr){
  const base=momPair(list,yr);
  if(cmpMode==='yoy'){
    const py=String(Number(yr)-1);
    if(base.lm&&completeMonths(py).includes(base.lm))return {lm:base.lm,pm:base.lm,pmYr:py,idx:base.idx,mode:'yoy'};
    return {lm:base.lm,pm:null,pmYr:null,idx:base.idx,mode:'yoy'};
  }
  return {lm:base.lm,pm:base.pm,pmYr:base.pmYr,idx:base.idx,mode:'mom'};
}
// The month a forecast-mode view focuses on: an explicit pick, else the live (mid-) month, else the latest complete month.
function fcstFocus(yr){
  if(selMonth&&STATUS[yr]?.[selMonth])return selMonth;
  const live=MONTHS.find(m=>STATUS[yr]?.[m]==='p');
  if(live)return live;
  const cm=completeMonths(yr);
  return cm.length?momPair(cm,yr).lm:MONTHS[0];
}

/* ---------- executive summary ---------- */
function computeSummary(yr){
  const months=completeMonths(yr);
  const per=TYPES.map(t=>{
    let f=0,s=0,hasAnyF=false;
    months.forEach(m=>{const d=DATA[yr][t.key][m];if(d){if(hasF(yr,t.key,m)){f+=d.f;hasAnyF=true;}s+=d.s;}});
    return {...t,f,s,att:hasAnyF&&f>0?s/f:null,hasF:hasAnyF};
  });
  let totF=0,totS=0;
  per.forEach(p=>{totF+=p.f;totS+=p.s;});
  // full-year forecast (all 12 months where forecast is valid)
  let fyF=0;
  TYPES.forEach(t=>MONTHS.forEach(m=>{if(hasF(yr,t.key,m))fyF+=DATA[yr][t.key][m].f;}));
  return {months,per,totF,totS,att:totF>0?totS/totF:null,fyF};
}

        <div class="kpi kc">
          <div class="kpi-name tc">Cases</div>
          ${mHasC&&pHasC?cmpBlock(fmtN(pC),fmtN(mC),''):'<div class="big">'+(mHasC?fmtN(mC):'—')+'</div>'}
          <div class="kpi-foot">${mHasC&&pHasC?momFoot(cMom):priorMissFoot('cases')}</div>
        </div>
      </div>
    </div>`;
  const specs=[];

    const series=S.months.map(m=>DATA[yr][t.key][m]?.s||0);

      <div class="prod-top"><div class="prod-name"><span class="dot" style="background:${cc}"></span>${t.key}</div><span class="chip ${cls}">${mom!=null?signPct(mom)+' MoM':'—'}</span></div>

    </div>`;

  const prod=`<div class="eyebrow e-cat">Year-to-date by category · units · revenue · cases</div><div class="prod-row">${momCards}</div>`;

      brandStrip=`<div class="eyebrow e-brand">Brands</div><div class="ov-brands">${boxes}</div>`;
    }
  }
  const icon=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l3.5-4 3 2.5L21 7"/></svg>`;
  return {html:`<div class="page-head"><div class="page-title">${icon}Executive Summary</div>${ctrlBox(yr,true)}</div>${kpi}${brandStrip}${prod}`, specs};

function buildFlowerSchedule(yr){
  const icon=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/></svg>`;
  const S=FLOWER_SCHED, MO=S.months, P=S.rows;
  const priced=P.filter(p=>!p.tbd);
  const rowQ=p=>p.q.reduce((a,v)=>a+(v||0),0);
  const rowS=p=>rowQ(p)*p.ppg;
  const moQ=i=>priced.reduce((a,p)=>a+(p.q[i]||0),0);
  const moS=i=>priced.reduce((a,p)=>a+(p.q[i]||0)*p.ppg,0);
  const grandQ=priced.reduce((a,p)=>a+rowQ(p),0);
  const grandS=priced.reduce((a,p)=>a+rowS(p),0);
  const blended=grandQ>0?grandS/grandQ:0;
  const kg=v=>fmtN(Math.round(v/1000));
  let pk=0; for(let i=1;i<MO.length;i++) if(moQ(i)>moQ(pk)) pk=i;

  const cid='flower-sched';
  const specs=[{cid,kind:'flower',labels:MO,series:priced.map(p=>({label:p.n,color:cssVar(p.c),data:p.q.map(v=>(v||0)/1000)}))}];

  const stats=`
    <div class="stat-row">
      <div class="stat"><div class="k">Total Quantity</div><div class="v teal">${kg(grandQ)} kg</div><div class="s">excl. Hydrocarbon</div></div>
      <div class="stat"><div class="k">Total Spend</div><div class="v" style="color:var(--accent)">${fmtMoneyK(grandS)}</div><div class="s">planned procurement</div></div>
      <div class="stat"><div class="k">Blended Cost</div><div class="v lav"><span class="cash">$${blended.toFixed(2)}/g</span></div><div class="s">weighted average</div></div>
      <div class="stat"><div class="k">Product Lines</div><div class="v">${P.length}</div><div class="s">${priced.length} priced · 1 TBD</div></div>
      <div class="stat"><div class="k">Planning Horizon</div><div class="v amber">${MO[0]}–${MO[MO.length-1]}</div><div class="s">${S.yr} · ${MO.length} months</div></div>
      <div class="stat"><div class="k">Peak Month</div><div class="v">${MO[pk]}</div><div class="s">${kg(moQ(pk))} kg</div></div>
    </div>`;

  const legend=`<div class="legend">${P.map(p=>`<div class="leg"><div class="leg-sq" style="background:var(${p.c})"></div>${p.n}</div>`).join('')}</div>`;

  const G='minmax(0,1.7fr) .5fr repeat(7,.62fr) .82fr .9fr';
  const head=`<div class="mrow head" style="grid-template-columns:${G}"><div>Flower Type</div><div>$/g</div>${MO.map(m=>`<div>${m}</div>`).join('')}<div>Total kg</div><div>Total $</div></div>`;
  const body=P.map(p=>{
    const cells=p.q.map(v=>p.tbd?`<div class="mc-cell muted">TBD</div>`:!v?`<div class="mc-cell">—</div>`:`<div class="mc-cell mc-dual">${kg(v)} kg<span class="mc-sub">${fmtMoneyK(v*p.ppg)}</span></div>`).join('');
    return `<div class="mrow" style="grid-template-columns:${G}">
      <div class="mc-month"><span class="dot" style="background:var(${p.c})"></span><span class="skf-d">${p.n}<small>${p.t}</small></span></div>
      <div class="mc-cell"><span class="cash">$${p.ppg.toFixed(2)}</span></div>
      ${cells}
      <div class="mc-cell teal">${p.tbd?'<span class="muted">TBD</span>':kg(rowQ(p))}</div>
      <div class="mc-cell" style="color:var(--accent)">${p.tbd?'<span class="muted">TBD</span>':fmtMoneyK(rowS(p))}</div>
    </div>`;
  }).join('');
  const totRow=`<div class="mrow skf-tot" style="grid-template-columns:${G}">
      <div class="mc-month">Total · ${priced.length} priced lines</div>
      <div class="mc-cell muted">—</div>
      ${MO.map((m,i)=>`<div class="mc-cell mc-dual">${kg(moQ(i))} kg<span class="mc-sub">${fmtMoneyK(moS(i))}</span></div>`).join('')}
      <div class="mc-cell teal">${kg(grandQ)}</div>
      <div class="mc-cell" style="color:var(--accent)">${fmtMoneyK(grandS)}</div>
    </div>`;

  const card=`<div class="month-card">
      <div class="mc-head">
        <div class="mc-name"><span class="dot" style="background:var(--accent)"></span>Monthly Quantity &amp; Spend by Product</div>
        <div class="badges"><span class="tb tb-vol">${kg(grandQ)} kg planned</span><span class="tb tb-nu">${MO[0]}–${MO[MO.length-1]} ${S.yr}</span></div>
      </div>
      ${stats}
      <div class="cat-sec" style="border-top:none"><div class="cat-chart-wide"><canvas id="${cid}" role="img" aria-label="Monthly flower procurement quantity by product, ${S.yr}"></canvas></div></div>
      <div class="mtable-scroll"><div class="mtable">${head}${body}${totRow}</div></div>
    </div>`;

  const note=`<div style="font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:14px;line-height:1.55">Source: SharePoint · 03. Operations / 08. Planning · “2026-06-21 - Flower Procurement Schedule SLT.xlsx”. Each month shows quantity in kilograms (top) and spend (bottom); spend = quantity × $/g. Table scrolls horizontally on narrow screens. Hydrocarbon pricing is TBD and excluded from totals.</div>`;

  const html=`<div class="page-head"><div class="page-title">${icon}Flower Procurement Schedule</div><div class="head-right"><span class="tb tb-nu">${S.yr} Plan · updated ${S.updated}</span></div></div>
    ${legend}
    ${card}
    ${note}`;
  return {html,specs};
}
