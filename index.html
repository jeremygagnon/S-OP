function buildProductionSchedule(yr,siteKey){
  const site=PROD_SITES.find(s=>s.key===siteKey)||PROD_SITES[0];
  if(siteKey==='harwill') return buildHarwillProd(yr);
  if(siteKey==='sparling') return buildSparlingProd(yr);
  const note=`<div class="inprog"><span class="tag">Building</span><span>The ${site.name} production schedule is being prepared — this page is a placeholder and will populate once the site's schedule data is loaded.</span></div>`;
  const body=`<div class="ops-ph"><div class="ph-d">Planned production runs at ${site.name} by line, product and week — build quantities, run-rate and scheduling against the demand plan.</div><span class="ph-chip">Awaiting data</span></div>`;
  return {html:`<div class="page-head"><div class="page-title">${PROD_ICON}${site.name} · Production Schedule</div></div>${note}${body}`, specs:[]};
}

function buildHarwillProd(yr){
  const H=HARWILL_SCHED, R=H.rows;
  const mf=v=>v||'—';
  const stMap={'IN PROGRESS':'st-prog','FIRM':'st-firm','STAGED':'st-staged','ON THE BOARD':'st-board','PLANNED':'st-planned'};
  const stLab={'IN PROGRESS':'In Progress','FIRM':'Firm','STAGED':'Staged','ON THE BOARD':'On Board','PLANNED':'Planned'};
  const skuSet=new Set(R.map(r=>r.sku).filter(s=>s&&s!=='TBD'));
  const inProg=R.filter(r=>r.st==='IN PROGRESS').length;
  const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const fmtDay=iso=>{const p=iso.split('-').map(Number);const dt=new Date(Date.UTC(p[0],p[1]-1,p[2]));return{dow:DOW[dt.getUTCDay()],lab:MON[p[1]-1]+' '+p[2]};};
  const win=fmtDay(H.frm).lab+'–'+fmtDay(H.to).lab;

  const days=[];
  R.forEach(r=>{let g=days.find(x=>x.d===r.d);if(!g){g={d:r.d,rows:[]};days.push(g);}g.rows.push(r);});

  const stats=`<div class="month-card" style="margin-bottom:16px">
    <div class="mc-head">
      <div class="mc-name"><span class="dot" style="background:var(--accent)"></span>Schedule Window</div>
      <div class="badges"><span class="tb tb-vol">${fmtN(R.length)} runs</span><span class="tb tb-up">${inProg} in progress</span><span class="tb tb-nu">${win} ${yr}</span></div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="k">Scheduled Runs</div><div class="v teal">${fmtN(R.length)}</div><div class="s">${win} ${yr}</div></div>
      <div class="stat"><div class="k">Production Days</div><div class="v lav">${fmtN(H.days)}</div><div class="s">working days</div></div>
      <div class="stat"><div class="k">Distinct SKUs</div><div class="v amber">${fmtN(skuSet.size)}</div><div class="s">finished goods</div></div>
    </div>
  </div>`;

  const legend=`<div class="legend">
    <div class="leg"><span class="dot" style="background:var(--teal)"></span>In Progress</div>
    <div class="leg"><span class="dot" style="background:var(--accent)"></span>Firm</div>
    <div class="leg"><span class="dot" style="background:var(--lav)"></span>Staged</div>
    <div class="leg"><span class="dot" style="background:var(--muted)"></span>On Board</div>
    <div class="leg" style="color:var(--faint)"><span class="dot" style="background:var(--faint)"></span>Planned</div>
  </div>`;

  const headRow=`<div class="srow head"><div>SKU</div><div>Product Description</div><div>Input Lot</div><div class="r">Input Qty</div><div>Output Lot</div><div class="r">Output Qty</div><div style="text-align:center">Prov</div><div>Status</div></div>`;

  const dayBlocks=days.map(g=>{
    const dd=fmtDay(g.d);
    const body=g.rows.map(r=>`<div class="srow">
        <div class="s-sku">${mf(r.sku)}</div>
        <div class="s-desc">${mf(r.desc)}</div>
        <div class="s-lot">${mf(r.il)}</div>
        <div class="s-qty">${mf(r.iq)}</div>
        <div class="s-out">${mf(r.ol)}</div>
        <div class="s-qty">${mf(r.oq)}</div>
        <div class="s-prov">${r.prov||'—'}</div>
        <div><span class="s-st ${stMap[r.st]||'st-board'}">${stLab[r.st]||r.st||'—'}</span></div>
      </div>`).join('');
    return `<div class="sched-day">
        <div class="sd-head"><span class="sd-dow">${dd.dow}</span><span class="sd-date">${dd.lab}, ${yr}</span><span class="sd-cnt">${g.rows.length} run${g.rows.length===1?'':'s'}</span></div>
        <div class="sched-scroll"><div class="stable">${headRow}${body}</div></div>
      </div>`;
  }).join('');

  const note=`<div style="font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:16px;line-height:1.55">Source: Smartsheet · &ldquo;Harwill Production Schedule&rdquo; (live), pulled ${H.updated}. Day-by-day run schedule from ${fmtDay(H.frm).lab}, ${yr} forward — ${R.length} runs across ${H.days} production days. SKU, lots, quantities, province &amp; status shown verbatim from the sheet; blank cells are unset at source. Tables scroll horizontally on narrow screens.</div>`;

  const html=`<div class="page-head"><div class="page-title">${PROD_ICON}Harwill · Production Schedule</div><div class="head-right"><span class="tb tb-nu">Smartsheet · updated ${H.updated}</span></div></div>
    ${stats}
    ${legend}
    ${dayBlocks}
    ${note}`;
  return {html,specs:[]};
}

function buildSparlingProd(yr){
  const S=SPARLING_SCHED;
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const md=iso=>{if(!iso)return '—';const p=iso.split('-').map(Number);return MON[p[1]-1]+' '+p[2];};
  const span=([a,b])=>md(a)+' – '+md(b);
  const num=v=>{const n=parseFloat(String(v).replace(/[^0-9.]/g,''));return isNaN(n)?0:n;};
  const nf=v=>{const n=num(v);return Number.isInteger(n)?fmtN(n):n.toLocaleString(undefined,{maximumFractionDigits:2});};

  /* ---- Solventless ---- */
  const SV=S.solventless;
  const svIn=SV.batches.reduce((a,b)=>a+num(b.inKg),0);
  const svOut=SV.batches.reduce((a,b)=>a+num(b.outKg),0);
  const svStats=`<div class="month-card" style="margin-bottom:16px">
    <div class="mc-head"><div class="mc-name"><span class="dot" style="background:var(--accent)"></span>Solventless · Window</div>
      <div class="badges"><span class="tb tb-vol">${SV.batches.length} batches</span><span class="tb tb-nu">${span(SV.span)} ${yr}</span></div></div>
    <div class="stat-row">
      <div class="stat"><div class="k">Wash Batches</div><div class="v teal">${fmtN(SV.batches.length)}</div><div class="s">${SV.cultivars} cultivars</div></div>
      <div class="stat"><div class="k">Input Biomass</div><div class="v lav">${fmtN(svIn)} kg</div><div class="s">into washing</div></div>
      <div class="stat"><div class="k">Finished Output</div><div class="v amber">${nf(svOut)} kg</div><div class="s">post-testing rosin</div></div>
    </div>
  </div>`;
  const svG='minmax(150px,1.7fr) 86px 86px 80px 84px';
  const svHead=`<div class="prow head" style="grid-template-columns:${svG}"><div>Process Stage</div><div>Start</div><div>End</div><div class="r">Input kg</div><div class="r">Output kg</div></div>`;
  const svCards=SV.batches.map(b=>{
    const rows=b.stages.map(s=>`<div class="prow" style="grid-template-columns:${svG}">
        <div class="p-stage">${s.p}</div>
        <div class="p-date">${md(s.s)}</div>
        <div class="p-date">${md(s.e)}</div>
        <div class="p-kg">${s.i?nf(s.i):'—'}</div>
        <div class="p-kg teal">${s.o?nf(s.o):'—'}</div>
      </div>`).join('');
    return `<div class="month-card" style="margin-bottom:12px">
        <div class="mc-head"><div class="mc-name"><span class="dot" style="background:var(--teal)"></span>${b.name}<span class="b-code">${b.code}</span></div>
          <div class="badges"><span class="tb tb-nu">${span([b.start,b.end])} ${yr}</span><span class="tb tb-vol">${nf(b.inKg)}→${nf(b.outKg)} kg</span></div></div>
        <div class="sched-scroll"><div class="ptable" style="min-width:540px">${svHead}${rows}</div></div>
      </div>`;
  }).join('');

  /* ---- GMP Distillate ---- */
  const GP=S.gmp;
  const totStages=GP.lots.reduce((a,l)=>a+l.stages.length,0);
  const gpStats=`<div class="month-card" style="margin-bottom:16px">
    <div class="mc-head"><div class="mc-name"><span class="dot" style="background:var(--accent)"></span>GMP Distillate · Window</div>
      <div class="badges"><span class="tb tb-vol">${GP.lots.length} lots</span><span class="tb tb-nu">${span(GP.span)} ${yr}</span></div></div>
    <div class="stat-row">
      <div class="stat"><div class="k">Distillate Lots</div><div class="v teal">${fmtN(GP.lots.length)}</div><div class="s">GMP / export</div></div>
      <div class="stat"><div class="k">Production Stages</div><div class="v lav">${fmtN(totStages)}</div><div class="s">scheduled</div></div>
      <div class="stat"><div class="k">Complete</div><div class="v amber">0%</div><div class="s">all not started</div></div>
    </div>
  </div>`;
  const gpG='minmax(160px,1.9fr) 86px 92px 96px';
  const gpHead=`<div class="prow head" style="grid-template-columns:${gpG}"><div>Process Stage</div><div>Start</div><div>Complete</div><div>Status</div></div>`;
  const stCls=st=>/progress/i.test(st)?'st-prog':/complete|done/i.test(st)?'st-firm':'st-planned';
  const gpCards=GP.lots.map(l=>{
    const rows=l.stages.map(s=>`<div class="prow" style="grid-template-columns:${gpG}">
        <div class="p-stage">${s.p}</div>
        <div class="p-date">${md(s.s)}</div>
        <div class="p-date">${md(s.e)}</div>
        <div><span class="s-st ${stCls(s.st)}">${s.st||'—'}</span></div>
      </div>`).join('');
    return `<div class="month-card" style="margin-bottom:12px">
        <div class="mc-head"><div class="mc-name"><span class="dot" style="background:var(--lav)"></span>GMP Distillate · ${l.label}</div>
          <div class="badges"><span class="tb tb-nu">${span([l.start,l.end])} ${yr}</span><span class="tb tb-vol">${l.stages.length} stages</span></div></div>
        <div class="sched-scroll"><div class="ptable" style="min-width:480px">${gpHead}${rows}</div></div>
      </div>`;
  }).join('');
  const gpNote=`<div style="font-family:var(--mono);font-size:10.5px;color:var(--faint);margin:2px 2px 12px">Input/output lot numbers &amp; quantities are not yet entered at source — each lot also carries import/export permit tasks (regulatory) tracked separately on the sheet.</div>`;

  const note=`<div style="font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:18px;line-height:1.55">Source: Smartsheet · &ldquo;Solventless Schedule&rdquo; &amp; &ldquo;GMP Distillate Tracker&rdquo; (live), pulled ${S.updated}. Forward production plan from ${md(S.frm)} ${yr}. Both are staged batch pipelines — solventless rosin runs Washing → Freeze-Dry → Pressing → Curing → Decarb → Testing; GMP distillate runs CO₂ Extraction → Winterization → Distillation → Testing → Packaging → Labelling. Tables scroll horizontally on narrow screens.</div>`;

  const toggle=`<div class="seg-slider spar-toggle" id="sparStream" style="--n:2;--i:0"><span class="seg-thumb"></span><button class="seg active" data-stream="solventless">Solventless Rosin</button><button class="seg" data-stream="gmp">GMP Distillate</button></div>`;
  const html=`<div class="page-head"><div class="page-title">${PROD_ICON}Sparling · Production Schedule</div><div class="head-right"><span class="tb tb-nu">Smartsheet · updated ${S.updated}</span></div></div>
    ${toggle}
    <div id="spar-solventless" class="spar-pane">
      <div class="stream-head"><div class="stream-title"><span class="dot" style="background:var(--teal)"></span>Solventless Rosin</div><span class="stream-sub">${SV.batches.length} batches · ${span(SV.span)} ${yr}</span></div>
      ${svStats}
      ${svCards}
    </div>
    <div id="spar-gmp" class="spar-pane hidden">
      <div class="stream-head"><div class="stream-title"><span class="dot" style="background:var(--lav)"></span>GMP Distillate</div><span class="stream-sub">${GP.lots.length} lots · ${span(GP.span)} ${yr}</span></div>
      ${gpStats}
      ${gpNote}
      ${gpCards}
    </div>
    ${note}`;
  return {html,specs:[]};
}

/* ---------- overview · forecast for a selected future month ---------- */
function buildOverviewForecast(yr,mon,st){
  const mi=MONTHS.indexOf(mon);
  const rows=TYPES.map(t=>{
    const f=hasF(yr,t.key,mon)?DATA[yr][t.key][mon].f:null;
    let rev=0,cas=0,hasSku=false;
    const brands=(typeof SKU_DATA!=='undefined'&&SKU_DATA[yr]?.[t.key])||{};
    for(const bn in brands){for(const s of brands[bn]){const fu=(s.f&&s.f[mi])||0;rev+=fu*s.p;if(s.u)cas+=fu/s.u;if(fu>0)hasSku=true;}}
    return {key:t.key,cc:catColor(t.key),f,rev:hasSku?rev:null,cas:hasSku?cas:null};
  });
  const totU=rows.reduce((a,r)=>a+(r.f||0),0);
  const totRev=rows.reduce((a,r)=>a+(r.rev||0),0);
  const totCas=rows.reduce((a,r)=>a+(r.cas||0),0);
  const anyRev=rows.some(r=>r.rev!=null);
  const nCats=rows.filter(r=>r.f!=null).length;
  const isLive=st==='p';
  const stTag=isLive?' · live · month-to-date plan':' · upcoming';
  const kpi=`
    <div class="eyebrow e-all">${mf(mon)} ${yr} forecast${stTag}</div>
    <div class="kpi-row">
      <div class="kpi-cell"><div class="kpi kr"><div class="kpi-name tr">Forecast Revenue</div><div class="big" style="color:var(--teal)">${anyRev?fmtMoneyK(totRev):'—'}</div><div class="kpi-foot"><span class="sub">${mf(mon)} ${yr} plan</span></div></div></div>
      <div class="kpi-cell"><div class="kpi ku"><div class="kpi-name tu">Forecast Units</div><div class="big" style="color:var(--accent)">${fmtK(totU)}</div><div class="kpi-foot"><span class="sub">across ${nCats} categor${nCats===1?'y':'ies'}</span></div></div></div>
      <div class="kpi-cell"><div class="kpi kc"><div class="kpi-name tc">Forecast Cases</div><div class="big">${anyRev?fmtN(totCas):'—'}</div><div class="kpi-foot"><span class="sub">${mf(mon)} ${yr} plan</span></div></div></div>
    </div>`;
  const boxes=rows.map(r=>{
    const share=(totU>0&&r.f!=null)?r.f/totU*100:null;
    const shareTxt=share==null?'—':(share<1?share.toFixed(1):Math.round(share))+'%';
    return `<div class="prod">
      <div class="prod-top"><div class="prod-name"><span class="dot" style="background:${r.cc}"></span>${r.key}</div><span class="chip nu">${shareTxt} of plan</span></div>
      <div class="prod-nums">
        <div class="col"><div class="k">Forecast units</div><div class="vv" style="color:var(--lav)">${r.f!=null?fmtN(r.f):'—'}</div></div>
        <div class="col mid"><div class="k">Forecast $</div><div class="vv" style="color:var(--accent)">${r.rev!=null?fmtMoneyK(r.rev):'—'}</div></div>
        <div class="col"><div class="k">Forecast cases</div><div class="vv">${r.cas!=null?fmtN(r.cas):'—'}</div></div>
      </div>
    </div>`;
  }).join('');
  const prod=`<div class="eyebrow e-cat">Forecast · ${mf(mon)} ${yr} · by category · units · revenue · cases</div><div class="prod-row">${boxes}</div>`;
  const icon=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l3.5-4 3 2.5L21 7"/></svg>`;
  return {html:`<div class="page-head"><div class="page-title">${icon}Executive Summary</div>${ctrlBox(yr,true)}</div>${kpi}${prod}`, specs:[]};
}

/* ---------- crystal ball · forward projection ---------- */
// Projects upcoming months from each category's 2025 seasonal shape scaled by its realized 2026 momentum,
// shown against the official plan (DATA.f) with a variance-based confidence range. (OCS overlay pending export.)
function buildCrystal(yr){
  const icon=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="7"/><path d="M9.5 6.6a3.2 3.2 0 0 1 3-1.4"/><path d="M7 19h10"/><path d="M9.5 21h5"/></svg>`;
  const yrs=`<div class="seg-slider" id="yrGroup" style="--n:2;--i:${yr==='2026'?1:0}"><span class="seg-thumb"></span><button class="seg${yr==='2025'?' active':''}" data-yr="2025">2025</button><button class="seg${yr==='2026'?' active':''}" data-yr="2026">2026</button></div>`;
  const head=`<div class="page-head"><div class="page-title">${icon}Crystal Ball</div><div class="head-right"><div class="ctrl-box">${yrs}</div></div></div>`;

  const prevYr=String(Number(yr)-1);
  const future=MONTHS.filter(m=>STATUS[yr]?.[m]==='f');
  const base=completeMonths(yr);
  if(!future.length||completeMonths(prevYr).length<6||base.length<2){
    const note=!future.length
      ? `Every month of ${yr} is already complete — there are no upcoming months left to project. Switch to 2026 to see the forward forecast.`
      : `Not enough history to project ${yr}: the Crystal Ball needs a full prior year (${prevYr}) plus at least two complete months of ${yr}.`;
    return {html:`${head}<div class="month-card"><div class="cat-sec" style="border-top:none;color:var(--muted);padding:22px 20px;line-height:1.6">${note}</div></div>`,specs:[]};
  }

  const baseIdx=base.map(m=>MONTHS.indexOf(m));
  const lastCompIdx=baseIdx[baseIdx.length-1];
  const projMonths=MONTHS.filter(m=>STATUS[yr]?.[m]==='p'||STATUS[yr]?.[m]==='f'); // bridge spans the live month onward

  const cats=TYPES.map(t=>{
    const cc=catColor(t.key);
    const s25=MONTHS.map(m=>DATA[prevYr]?.[t.key]?.[m]?.s??0);
    const s26=MONTHS.map(m=>DATA[yr]?.[t.key]?.[m]?.s??0);
    let cur=0,prior=0;const ratios=[];
    baseIdx.forEach(i=>{cur+=s26[i];prior+=s25[i];if(s25[i]>0)ratios.push(s26[i]/s25[i]);});
    const g=prior>0?cur/prior:1; // realized YoY momentum over complete months
    const oc=OCS[t.key];
    const gMkt=oc?oc.gMkt:1;                                // whole-market (all OCS suppliers) YoY momentum for this category
    const gBlend=oc?OCS._meta.wInt*g+OCS._meta.wMkt*gMkt:g; // Mera's momentum tempered toward what the market is doing
    const mean=ratios.length?ratios.reduce((a,b)=>a+b,0)/ratios.length:g;
    const sd=ratios.length?Math.sqrt(ratios.reduce((a,b)=>a+(b-mean)**2,0)/ratios.length):0;
    let ytdS=0,ytdD=0,ytdC=0,hasD=false,hasC=false;
    baseIdx.forEach(i=>{const d=DATA[yr][t.key][MONTHS[i]];if(d){ytdS+=d.s;if(d.d!=null){ytdD+=d.d;hasD=true;}if(d.c!=null){ytdC+=d.c;hasC=true;}}});
    const price=(hasD&&ytdS>0)?ytdD/ytdS:null;   // $/unit from completed 2026 months
    const upc=(hasC&&ytdC>0)?ytdS/ytdC:null;      // units per case
    const proj={};
    projMonths.forEach(m=>{const i=MONTHS.indexOf(m);const seed=s25[i];proj[m]={mid:seed*gBlend,lo:seed*Math.max(0,gBlend-sd),hi:seed*(gBlend+sd),plan:hasF(yr,t.key,m)?DATA[yr][t.key][m].f:null};});
    let pmid=0,plo=0,phi=0,pplan=0,hasPlan=false;
    future.forEach(m=>{const p=proj[m];pmid+=p.mid;plo+=p.lo;phi+=p.hi;if(p.plan!=null){pplan+=p.plan;hasPlan=true;}});
    // per-category chart series: 2025 actual (full), 2026 sold (complete months only), plan, and projection bridged from the last complete month
    const cid=`crystal-${yr}-${t.key.replace(/[^a-z]/gi,'')}`;
    const cActual=MONTHS.map((m,i)=>STATUS[yr]?.[m]==='c'?s26[i]:null);
    const cPlan=MONTHS.map(m=>hasF(yr,t.key,m)?DATA[yr][t.key][m].f:null);
    const cProj=MONTHS.map(()=>null);
    cProj[lastCompIdx]=cActual[lastCompIdx];
    projMonths.forEach(m=>{cProj[MONTHS.indexOf(m)]=proj[m].mid;});
    return {key:t.key,cc,cid,price,upc,proj,prev:s25,actual:cActual,plan:cPlan,cproj:cProj,pmid,plo,phi,pplan:hasPlan?pplan:null,projRev:price!=null?pmid*price:null,projCas:upc!=null?pmid/upc:null,gInt:g,gMkt,gBlend,oc};
  });

  let Tu=0,Tlo=0,Thi=0,Trev=0,Tcas=0,Tplan=0,hasRev=false,hasCas=false,hasPlan=false;
  cats.forEach(c=>{Tu+=c.pmid;Tlo+=c.plo;Thi+=c.phi;if(c.projRev!=null){Trev+=c.projRev;hasRev=true;}if(c.projCas!=null){Tcas+=c.projCas;hasCas=true;}if(c.pplan!=null){Tplan+=c.pplan;hasPlan=true;}});
  const vsPlan=hasPlan&&Tplan>0?(Tu-Tplan)/Tplan*100:null;
  const horizon=`${mf(future[0])}–${mf(future[future.length-1])} ${yr}`;
  const nMo=future.length;

  const vpCol=vsPlan==null?'var(--ink)':vsPlan>=0?'var(--teal)':'var(--coral)';
  const kpi=`
    <div class="eyebrow e-all">Crystal Ball · forward projection · ${horizon}</div>
    <div class="kpi-row">
      <div class="kpi-cell"><div class="kpi kr"><div class="kpi-name tr">Projected Revenue</div><div class="big" style="color:var(--teal)">${hasRev?fmtMoneyK(Trev):'—'}</div><div class="kpi-foot"><span class="sub">${nMo}-month outlook</span></div></div></div>
      <div class="kpi-cell"><div class="kpi ku"><div class="kpi-name tu">Projected Units</div><div class="big" style="color:var(--accent)">${fmtK(Tu)}</div><div class="kpi-foot"><span class="sub">range ${fmtK(Tlo)} – ${fmtK(Thi)}</span></div></div></div>
      <div class="kpi-cell"><div class="kpi kc"><div class="kpi-name tc">vs Plan</div><div class="big" style="color:${vpCol}">${vsPlan!=null?signPct(vsPlan):'—'}</div><div class="kpi-foot"><span class="sub">${hasPlan?'model vs '+fmtK(Tplan)+' planned':'no plan on file'}</span></div></div></div>
    </div>`;

  const totPrev=MONTHS.map(m=>TYPES.reduce((a,t)=>a+(DATA[prevYr]?.[t.key]?.[m]?.s||0),0));
  const totAct=MONTHS.map(m=>STATUS[yr]?.[m]==='c'?TYPES.reduce((a,t)=>a+(DATA[yr]?.[t.key]?.[m]?.s||0),0):null);
  const totPlan=MONTHS.map(m=>{let v=0,any=false;TYPES.forEach(t=>{if(hasF(yr,t.key,m)){v+=DATA[yr][t.key][m].f;any=true;}});return any?v:null;});
  const totProj=MONTHS.map(()=>null);
  totProj[lastCompIdx]=totAct[lastCompIdx];
  projMonths.forEach(m=>{const i=MONTHS.indexOf(m);totProj[i]=cats.reduce((a,c)=>a+(c.proj[m]?.mid||0),0);});
  const heroCid=`crystal-${yr}`;
  const specs=[{cid:heroCid,kind:'crystal',labels:MONTHS.map(mf),prev:totPrev,actual:totAct,plan:totPlan,proj:totProj,color:cssVar('--accent')}];
  const legend=`<div class="spark-leg"><span><i style="border-color:var(--accent)"></i>2026 sold</span><span><i class="dash" style="border-color:var(--accent)"></i>Crystal Ball</span><span><i class="dash" style="border-color:var(--lav)"></i>Plan</span><span><i style="border-color:${hexA(cssVar('--accent'),.4)}"></i>2025 actual</span></div>`;
  const heroCard=`<div class="month-card">
    <div class="mc-head">
      <div class="mc-name"><span class="dot" style="background:var(--accent)"></span>Total units · actual vs projection</div>
      <div class="badges"><span class="tb tb-vol">${horizon}</span><span class="tb tb-nu">${fmtK(Tu)} u projected</span></div>
    </div>
    <div class="cat-sec" style="border-top:none"><div class="cat-chart-wide"><canvas id="${heroCid}" role="img" aria-label="Total units 2025 actual, 2026 sold, plan and Crystal Ball projection"></canvas></div></div>
    ${legend}
    <div class="mom-cap" style="padding:0 20px 16px">Projection blends Mera's own realized ${base.length}-month YoY momentum (${Math.round(OCS._meta.wInt*100)}%) with the whole Ontario market's category momentum (${Math.round(OCS._meta.wMkt*100)}%), drawn from ${OCS._meta.nMo} months of OCS province-wide sell-through (${OCS._meta.from}→${OCS._meta.to}); each category's 2025 monthly shape is scaled by that blend. Range reflects month-to-month variance in Mera's momentum. Mera now holds ${(OCS._all.shr*100).toFixed(1)}% unit share of these categories, down from ${(OCS._all.shrP*100).toFixed(1)}% a year ago.</div>
  </div>`;

  const boxes=cats.map(c=>{
    const vp=c.pplan!=null&&c.pplan>0?(c.pmid-c.pplan)/c.pplan*100:null;
    const chip=vp==null?'<span class="chip nu">no plan</span>':`<span class="chip ${vp>=0?'over':'under'}">${signPct(vp)} vs plan</span>`;
    specs.push({cid:c.cid,kind:'crystal',labels:MONTHS.map(mf),prev:c.prev,actual:c.actual,plan:c.plan,proj:c.cproj,color:c.cc});
    const hasPlanLine=c.plan.some(v=>v!=null);
    let mktLine='';
    if(c.oc){
      const myoy=(c.gMkt-1)*100, shr=c.oc.shr*100, dShr=(c.oc.shr-c.oc.shrP)*100, up=dShr>=0;
      const myCol=myoy>=0?'var(--teal)':'var(--coral)', shCol=up?'var(--teal)':'var(--coral)';
      mktLine=`<div class="ocs-sig"><span>OCS market <b style="color:${myCol}">${signPct(myoy)}</b> YoY</span><span>Mera share ${shr.toFixed(1)}% <b style="color:${shCol}">${up?'▲':'▼'} ${Math.abs(dShr).toFixed(1)}pp</b></span></div>`;
    }
    return `<div class="prod">
      <div class="prod-top"><div class="prod-name"><span class="dot" style="background:${c.cc}"></span>${c.key}</div>${chip}</div>
      <div class="mom-spark"><canvas id="${c.cid}" role="img" aria-label="${c.key} units · 2026 sold and Crystal Ball projection"></canvas></div>
      <div class="spark-leg"><span><i style="border-color:${c.cc}"></i>Sold</span><span><i class="dash" style="border-color:${c.cc}"></i>Crystal Ball</span>${hasPlanLine?`<span><i class="dash" style="border-color:${hexA(cssVar('--lav'),.65)}"></i>Plan</span>`:''}</div>
      <div class="prod-nums">
        <div class="col"><div class="k">Proj. units</div><div class="vv" style="color:var(--lav)">${fmtN(c.pmid)}</div></div>
        <div class="col mid"><div class="k">Proj. $</div><div class="vv" style="color:var(--accent)">${c.projRev!=null?fmtMoneyK(c.projRev):'—'}</div></div>
        <div class="col"><div class="k">Proj. cases</div><div class="vv">${c.projCas!=null?fmtN(c.projCas):'—'}</div></div>
      </div>
      ${mktLine}
    </div>`;
  }).join('');
  const catSec=`<div class="eyebrow e-cat">Forward forecast · ${horizon} · by category · actual vs projection</div><div class="prod-row">${boxes}</div>`;

  const g='minmax(0,1.25fr) .8fr 1fr .8fr .7fr .9fr';
  const monHead=`<div class="mrow head" style="grid-template-columns:${g}"><div>Month</div><div>Projected</div><div>Range</div><div>Plan</div><div>vs plan</div><div>$ Proj</div></div>`;
  let tMid=0,tLo=0,tHi=0,tPlan=0,tRev=0,tHasPlan=false,tHasRev=false;
  const monRows=future.map(m=>{
    let mid=0,lo=0,hi=0,plan=0,rev=0,hasP=false,hasR=false;
    cats.forEach(c=>{const p=c.proj[m];mid+=p.mid;lo+=p.lo;hi+=p.hi;if(p.plan!=null){plan+=p.plan;hasP=true;}if(c.price!=null){rev+=p.mid*c.price;hasR=true;}});
    tMid+=mid;tLo+=lo;tHi+=hi;if(hasP){tPlan+=plan;tHasPlan=true;}if(hasR){tRev+=rev;tHasRev=true;}
    const vp=hasP&&plan>0?(mid-plan)/plan*100:null;
    return `<div class="mrow" style="grid-template-columns:${g}">
      <div class="mc-month"><span class="dot" style="background:var(--accent)"></span>${mf(m)}<span class="ni-tag">Upcoming</span></div>
      <div class="mc-cell lav">${fmtN(mid)}</div>
      <div class="mc-cell muted">${fmtK(lo)} – ${fmtK(hi)}</div>
      <div class="mc-cell" style="color:var(--lav)">${hasP?fmtN(plan):'—'}</div>
      <div class="mc-cell ${vp==null?'muted':vp>=0?'pos':'neg'}">${vp!=null?signPct(vp):'—'}</div>
      <div class="mc-cell" style="color:var(--accent)">${hasR?fmtMoneyK(rev):'—'}</div>
    </div>`;
  }).join('');
  const tVp=tHasPlan&&tPlan>0?(tMid-tPlan)/tPlan*100:null;
  const monTot=`<div class="mrow skf-tot" style="grid-template-columns:${g}">
    <div class="mc-month">Total · ${nMo} mo</div>
    <div class="mc-cell lav">${fmtN(tMid)}</div>
    <div class="mc-cell muted">${fmtK(tLo)} – ${fmtK(tHi)}</div>
    <div class="mc-cell" style="color:var(--lav)">${tHasPlan?fmtN(tPlan):'—'}</div>
    <div class="mc-cell ${tVp==null?'muted':tVp>=0?'pos':'neg'}">${tVp!=null?signPct(tVp):'—'}</div>
    <div class="mc-cell" style="color:var(--accent)">${tHasRev?fmtMoneyK(tRev):'—'}</div>
  </div>`;
  const tableCard=`<div class="month-card">
    <div class="mc-head">
      <div class="mc-name"><span class="dot" style="background:var(--accent)"></span>Monthly Projection</div>
      <div class="badges"><span class="tb tb-vol">${horizon}</span><span class="tb tb-nu">central estimate</span></div>
    </div>
    <div class="mtable">${monHead}${monRows}${monTot}</div>
  </div>`;

  return {html:`${head}${kpi}${heroCard}${catSec}${tableCard}`,specs};
}

/* ---------- single category page ---------- */
function buildCategory(yr,catKey){
  const t=TYPES.find(x=>x.key===catKey)||TYPES[0];
  const color=catColor(catKey);
  const nav=navMonths(yr);
  const cm=completeMonths(yr);
  const showYoY=yr==2026;

  let totF=0,totS=0,hasAnyF=false,totD=0,totC=0,hasD=false,hasC=false;
  cm.forEach(m=>{const d=DATA[yr][catKey][m];if(d){totS+=d.s;if(hasF(yr,catKey,m)){totF+=d.f;hasAnyF=true;}if(d.d!=null){totD+=d.d;hasD=true;}if(d.c!=null){totC+=d.c;hasC=true;}}});
  const showDC=hasD||hasC;
  const att=hasAnyF&&totF>0?totS/totF:null;
  const acc=att!=null?(att-1)*100:null;
  let fyF=0;MONTHS.forEach(m=>{if(hasF(yr,catKey,m))fyF+=DATA[yr][catKey][m].f;});
  const fyPct=fyF>0?Math.round(totS/fyF*100):null;

  const labels=nav.map(mf);
  const fvals=nav.map(m=>hasF(yr,catKey,m)?DATA[yr][catKey][m].f:null);
  const svals=nav.map(m=>DATA[yr][catKey][m]?.s||0);
  const cid=`cat-${yr}-${catKey.replace(/[^a-z]/gi,'')}`;
  const specs=[];
  if(cmpMode!=='fcst')specs.push({cid,kind:'group',labels,fvals,svals,color});

  const statRow=`
    <div class="stat-row">
      <div class="stat"><div class="k">Total sold · YTD</div><div class="v teal">${fmtK(totS)}</div><div class="s">${cm.length} mo actual</div></div>
      <div class="stat"><div class="k">Revenue · YTD</div><div class="v" style="color:var(--accent)">${hasD?fmtMoneyK(totD):'—'}</div><div class="s">${hasD?'sold-through value':'not in source'}</div></div>
      <div class="stat"><div class="k">Cases · YTD</div><div class="v">${hasC?fmtK(totC):'—'}</div><div class="s">${hasC?'cases sold':'not in source'}</div></div>
      <div class="stat"><div class="k">Total forecast</div><div class="v lav">${hasAnyF?fmtK(totF):'—'}</div><div class="s">${hasAnyF?'units planned':'no plan on file'}</div></div>
      <div class="stat"><div class="k">vs forecast</div><div class="v" style="color:${acc!=null&&acc<0?'var(--coral)':'var(--teal)'}">${acc!=null?signPct(acc):'—'}</div><div class="s">${att!=null?Math.round(att*100)+'% attained':'no plan'}</div></div>
      <div class="stat"><div class="k">vs full-year plan</div><div class="v amber">${fyPct!=null?fyPct+'%':'—'}</div><div class="s">of ${fmtK(fyF)} annual</div></div>
    </div>`;

  const cols=['1fr','.78fr'];
  if(showDC)cols.push('.82fr','.6fr');
  cols.push('.82fr','.7fr','.7fr');
  if(showYoY)cols.push('.7fr');
  const gcol=cols.join(' ');
  const headRow=`<div class="mrow head" style="grid-template-columns:${gcol}"><div>Month</div><div>Sold</div>${showDC?'<div>$ Rev</div><div>Cases</div>':''}<div>Forecast</div><div>vs fcst</div><div>MoM</div>${showYoY?'<div>YoY ’25</div>':''}</div>`;
  const rows=nav.map((m,i)=>{
    const d=DATA[yr][catKey][m]||{f:0,s:0};
    const tHasF=hasF(yr,catKey,m);
    const tAtt=tHasF&&d.f>0?d.s/d.f:null;
    const tAcc=tAtt!=null?(tAtt-1)*100:null;
    const prevM=i>0?nav[i-1]:null;
    const prevS=prevM?(DATA[yr][catKey][prevM]?.s||0):null;
    const tMom=prevS!=null&&prevS>0?(d.s-prevS)/prevS*100:null;
    const t25=showYoY?(DATA[2025]?.[catKey]?.[m]?.s??null):null;
    const tYoY=t25!=null&&t25>0?(d.s-t25)/t25*100:null;
    const partial=STATUS[yr][m]==='p';
    return `<div class="mrow" style="grid-template-columns:${gcol}">
      <div class="mc-month"><span class="dot" style="background:${color}"></span>${mf(m)}${partial?'<span class="ni-tag">Live</span>':''}</div>
      <div class="mc-cell teal">${fmtN(d.s)}</div>
      ${showDC?`<div class="mc-cell" style="color:var(--accent)">${fmtMoneyK(d.d)}</div><div class="mc-cell">${fmtN(d.c)}</div>`:''}
      <div class="mc-cell lav">${tHasF?fmtN(d.f):'—'}</div>
      <div class="mc-cell ${tAcc==null?'muted':tAcc>=0?'pos':'neg'}">${tAcc!=null?signPct(tAcc):'—'}</div>
      <div class="mc-cell ${tMom==null?'muted':tMom>=0?'pos':'neg'}">${tMom!=null?signPct(tMom):'—'}</div>
      ${showYoY?`<div class="mc-cell" style="color:${tYoY==null?'var(--faint)':tYoY>=0?'var(--amber)':'var(--coral)'}">${tYoY!=null?signPct(tYoY):'—'}</div>`:''}
    </div>`;
  }).join('');

  const accBadge=acc==null?'<span class="tb tb-nu">vs fcst: —</span>':acc>=0?`<span class="tb tb-up">vs fcst: ${signPct(acc)}</span>`:`<span class="tb tb-dn">vs fcst: ${signPct(acc)}</span>`;
  const legend=`<div class="legend">
    <div class="leg"><div class="leg-sq" style="background:${hexA(color,.85)}"></div>Sold</div>
    <div class="leg"><div class="leg-sq" style="background:${hexA(color,.28)}"></div>Forecast</div>
  </div>`;

  let momPanel='';
  const {lm,pm,pmYr,mode}=cmpPair(cm,yr);
  const cmpLbl=mode==='yoy'?'YoY':'MoM';
  const cmpFull=mode==='yoy'?'Year-Over-Year':'Month-Over-Month';
  const pmLab=pmLabel(pm,pmYr,yr);
  if(pm&&cmpMode!=='fcst'){
    const a=DATA[pmYr]?.[catKey]?.[pm]||{}, b=DATA[yr][catKey][lm]||{};
    const uPct=a.s>0?(b.s-a.s)/a.s*100:null;
    const dPct=(a.d!=null&&b.d!=null&&a.d>0)?(b.d-a.d)/a.d*100:null;
    const cPct=(a.c!=null&&b.c!=null&&a.c>0)?(b.c-a.c)/a.c*100:null;
    const dirOf=p=>p==null?'':p>=0?'pos':'neg';
    const arrowOf=p=>p==null?'·':p>=0?'▲':'▼';
    const momCid=`mom-${yr}-${catKey.replace(/[^a-z]/gi,'')}`;
    const idxOf=(prev,cur)=>(prev!=null&&cur!=null&&prev>0)?cur/prev*100:null;
    specs.push({cid:momCid,kind:'buckets',color,
      labels:['Revenue','Units','Cases'],pmName:pmLab,lmName:mf(lm),
      pmIdx:[(a.d!=null&&a.d>0)?100:null,a.s>0?100:null,(a.c!=null&&a.c>0)?100:null],
      lmIdx:[idxOf(a.d,b.d),idxOf(a.s,b.s),idxOf(a.c,b.c)],
      raw:{prev:[a.d??null,a.s??null,a.c??null],cur:[b.d??null,b.s??null,b.c??null]},
      fmt:['money','n','n']});
    const chip=p=>p==null?'<span class="mom-chip">—</span>':`<span class="mom-chip ${dirOf(p)}">${arrowOf(p)} ${signPct(p)}</span>`;
    const cmpRow=(label,pv,cv,delta,sm,col)=>`<div class="cmp-lbl"${col?` style="color:${col}"`:''}>${label}</div><div class="cmp-v${sm?' sm':''}">${pv}</div><div class="cmp-arr">→</div><div class="cmp-v${sm?' sm':''}">${cv}</div><div class="cmp-dcell">${delta}</div>`;
    momPanel=`<div class="month-card mom-analysis">
      <div class="mc-head">
        <div class="mc-name"><span class="dot" style="background:${color}"></span>${cmpFull} Analysis</div>
        <div class="badges"><span class="tb tb-vol">${pmLab} → ${mf(lm)} ${yr}</span></div>
      </div>
      <div class="mom-2col">
        <div class="mom-compare">
          <div class="cmp-tbl">
            <div class="cmp-h"></div><div class="cmp-h">${pmLab}</div><div class="cmp-h"></div><div class="cmp-h">${mf(lm)}</div><div class="cmp-h">Δ ${cmpLbl}</div>
            ${cmpRow('Revenue',fmtMoneyK(a.d),fmtMoneyK(b.d),chip(dPct),true,'var(--teal)')}
            ${cmpRow('Units',fmtN(a.s),fmtN(b.s),chip(uPct),false,'var(--accent)')}
            ${cmpRow('Cases',fmtN(a.c),fmtN(b.c),chip(cPct),true,'var(--lav)')}
          </div>
        </div>
        <div class="mom-chartbox">
          <div class="mom-chart-h"><canvas id="${momCid}" role="img" aria-label="${catKey} ${pmLab} vs ${mf(lm)} indexed by bucket"></canvas></div>
          <div class="mom-cap">Indexed to ${pmLab} = 100% · hover bars for actuals</div>
        </div>
      </div>
    </div>`;
  }

  let brandPanel='';
  const brs=BRANDS[yr]?.[catKey];
  if(pm&&brs&&brs.length&&cmpMode!=='fcst'){
    const priorBrs=BRANDS[pmYr]?.[catKey]||[];
    const priorBrand=name=>priorBrs.find(x=>x.b===name);
    const metricRow=(label,col,pv,cv,money)=>{
      const f=money?fmtMoneyK:fmtN;
      const p=pv>0?(cv-pv)/pv*100:null;
      const dir=p==null?'flat':p>=0?'pos':'neg';
      const arrow=p==null?'·':p>=0?'▲':'▼';
      return `<div class="brand-metric"><div class="bm-lbl" style="color:${col}">${label}</div><div class="bm-vals">${f(pv)}<span class="arr">→</span>${f(cv)}</div><span class="mom-chip xs ${dir}">${arrow} ${signPct(p)}</span></div>`;
    };
    const boxes=brs.map(br=>{
      const pSrc=priorBrand(br.b);
      const pd=pSrc?pSrc.m[pm]:null, ld=br.m[lm];
      if(!pd||!ld)return '';
      const logo=BRAND_LOGOS[br.b];
      const inner=logo
        ? `<img src="${logo}" alt="${br.b} logo">`
        : `<div class="brand-word">${br.b}${br.b==='CCHR'?'<small>Countryside Harvest Reserve</small>':''}</div>`;
      const hasSku=!!(typeof SKU_DATA!=='undefined'&&SKU_DATA[yr]&&SKU_DATA[yr][catKey]&&SKU_DATA[yr][catKey][br.b]);
      const capAttrs=hasSku?` data-cat="${catKey}" data-brand="${br.b}" role="button" tabindex="0" aria-label="View ${br.b} SKU breakdown" title="View ${br.b} SKUs"`:'';
      const cap=`<div class="brand-cap"${capAttrs}>${inner}</div>`;
      return `<div class="brand-box">${cap}${metricRow('Revenue','var(--teal)',pd[1],ld[1],true)}${metricRow('Units','var(--accent)',pd[0],ld[0],false)}${metricRow('Cases','var(--lav)',pd[2],ld[2],false)}</div>`;
    }).filter(Boolean).join('');
    if(boxes){
      brandPanel=`<div class="month-card brand-mom">
        <div class="mc-head">
          <div class="mc-name"><span class="dot" style="background:${color}"></span>Brand Performance · ${cmpLbl}</div>
          <div class="badges"><span class="tb tb-vol">${pmLab} → ${mf(lm)} ${yr}</span></div>
        </div>
        <div class="brand-grid">${boxes}</div>
      </div>`;
    }
  }

  let forecastPanel='';
  if(cmpMode==='fcst'){
    const focusMon=fcstFocus(yr);
    const fd=DATA[yr]?.[catKey]?.[focusMon]||{};
    const fPlan=hasF(yr,catKey,focusMon)?fd.f:null;
    const fAct=fd.s||0;
    const st=STATUS[yr]?.[focusMon];
    const isLive=st==='p', isFuture=st==='f';
    const measured=!isFuture; // upcoming months have no sales booked yet
    const fAtt=(measured&&fPlan!=null&&fPlan>0)?fAct/fPlan*100:null;
    const fGap=(measured&&fPlan!=null)?fAct-fPlan:null;
    const attCol=fAtt==null?'var(--muted)':fAtt>=100?'var(--teal)':isLive?'var(--amber)':'var(--coral)';
    const attChip=fAtt==null?'':`<span class="mom-chip ${fAtt>=100?'pos':'neg'}">${fAtt>=100?'▲':'▼'} ${Math.round(fAtt)}%</span>`;
    const attTxt=fAtt!=null?Math.round(fAtt)+'%':'—';
    const gapTxt=fGap==null?'—':(fGap>=0?'+':'')+fmtN(fGap)+' u';
    const stTag=isLive?' · month-to-date':isFuture?' · upcoming':'';
    const headLabel=isLive?'Month-to-date vs plan':isFuture?'Planned units · no sales booked yet':'Sold vs plan';
    const caption=isLive?mf(focusMon)+' is mid-month — sold-to-date against the full-month plan.'
      :isFuture?mf(focusMon)+' '+yr+' is upcoming — planned units; no sales recorded yet.'
      :'Units sold vs the units planned for '+mf(focusMon)+' '+yr+'.';
    forecastPanel=`<div class="month-card fcst-outlook">
      <div class="mc-head">
        <div class="mc-name"><span class="dot" style="background:${color}"></span>Forecast vs Sold</div>
        <div class="badges"><span class="tb tb-vol">${mf(focusMon)} ${yr}${stTag}</span></div>
      </div>
      <div class="fc-single">
        <div class="fc-side-h">${headLabel}</div>
        <div class="fc-metrics">
          <div class="fc-metric"><div class="fc-k">Planned</div><div class="fc-val" style="color:var(--lav)">${fPlan!=null?fmtN(fPlan):'—'}</div></div>
          <div class="fc-metric"><div class="fc-k">Sold</div><div class="fc-val" style="color:var(--teal)">${fmtN(fAct)}</div></div>
          <div class="fc-metric"><div class="fc-k">Attainment</div><div class="fc-val" style="color:${attCol}">${attTxt}</div>${attChip}</div>
          <div class="fc-metric"><div class="fc-k">Gap to plan</div><div class="fc-val" style="color:${attCol}">${gapTxt}</div></div>
        </div>
        <div class="mom-cap">${caption}</div>
      </div>
    </div>`;
  }

  let breakdownCard;
  if(cmpMode==='fcst'){
    const focusMon=fcstFocus(yr);
    const mi=MONTHS.indexOf(focusMon);
    const brands=SKU_DATA[yr]?.[catKey]||{};
    const skf=[];
    for(const bn in brands){for(const s of brands[bn]){const fu=(s.f&&s.f[mi])||0;if(fu>0)skf.push({b:bn,k:s.k,d:s.d,p:s.p,u:s.u,fu});}}
    skf.sort((a,b)=>b.fu-a.fu);
    let tFu=0,tRev=0,tCas=0;
    skf.forEach(x=>{tFu+=x.fu;tRev+=x.fu*x.p;tCas+=x.u?x.fu/x.u:0;});
    const g='minmax(0,1.9fr) .7fr .85fr .55fr .55fr';
    const shareTxt=v=>{const p=tFu>0?v/tFu*100:0;return p<1?p.toFixed(1):Math.round(p);};
    const skHead=`<div class="mrow head" style="grid-template-columns:${g}"><div>SKU · Product</div><div>Forecast</div><div>$ Plan</div><div>Cases</div><div>Share</div></div>`;
    const skRows=skf.map(x=>`<div class="mrow" style="grid-template-columns:${g}">
        <div class="mc-month" style="font-weight:500"><span class="dot" style="background:${color}"></span><span class="skf-d">${x.d}<small>${x.b} · ${x.k}</small></span></div>
        <div class="mc-cell lav">${fmtN(x.fu)}</div>
        <div class="mc-cell" style="color:var(--accent)">${fmtMoneyK(x.fu*x.p)}</div>
        <div class="mc-cell">${fmtN(x.u?x.fu/x.u:0)}</div>
        <div class="mc-cell muted">${shareTxt(x.fu)}%</div>
      </div>`).join('');
    const skTot=`<div class="mrow skf-tot" style="grid-template-columns:${g}">
        <div class="mc-month">Total · ${skf.length} SKU${skf.length===1?'':'s'}</div>
        <div class="mc-cell lav">${fmtN(tFu)}</div>
        <div class="mc-cell" style="color:var(--accent)">${fmtMoneyK(tRev)}</div>
        <div class="mc-cell">${fmtN(tCas)}</div>
        <div class="mc-cell muted">100%</div>
      </div>`;
    const stTag=STATUS[yr]?.[focusMon]==='p'?' · live':STATUS[yr]?.[focusMon]==='f'?' · upcoming':'';
    const body=skf.length?`<div class="mtable">${skHead}${skRows}${skTot}</div>`:`<div class="cat-sec" style="border-top:none;color:var(--muted);padding:18px 20px">No SKU-level forecast on file for ${mf(focusMon)} ${yr}.</div>`;
    breakdownCard=`<div class="month-card">
      <div class="mc-head">
        <div class="mc-name"><span class="dot" style="background:${color}"></span>Forecast by SKU</div>
        <div class="badges"><span class="tb tb-vol">${mf(focusMon)} ${yr}${stTag}</span><span class="tb tb-nu">Plan: ${fmtN(tFu)} u</span></div>
      </div>
      ${statRow}
      ${body}
    </div>`;
  }else{
    breakdownCard=`<div class="month-card">
      <div class="mc-head">
        <div class="mc-name"><span class="dot" style="background:${color}"></span>Monthly Breakdown</div>
        <div class="badges"><span class="tb tb-vol">Sold: ${fmtN(totS)}</span>${accBadge}</div>
      </div>
      ${statRow}
      <div class="cat-sec" style="border-top:none"><div class="cat-chart-wide"><canvas id="${cid}" role="img" aria-label="${catKey} forecast vs sold by month ${yr}"></canvas></div></div>
      <div class="mtable">${headRow}${rows}</div>
    </div>`;
  }

  const html=`<div class="page-head"><div class="page-title"><span class="dot" style="background:${color};width:12px;height:12px"></span>${catKey}</div><div class="head-right">${ctrlBox(yr)}</div></div>
    ${forecastPanel}${momPanel}${brandPanel}${cmpMode!=='fcst'?legend:''}
    ${breakdownCard}`;
  return {html,specs};
}

/* ---------- sidebar nav ---------- */
function buildBrand(yr,brand){
  const specs=[];
  const cm=completeMonths(yr);
  const {lm,pm,pmYr,mode}=cmpPair(cm,yr);
  const cmpLbl=mode==='yoy'?'YoY':'MoM';
  const yoy=mode==='yoy'&&pm!=null;
  // MoM compares to the prior month within the same SKU series; YoY compares to the same month one year back (matched by SKU key).
  const showPrior=yoy?true:(pm!=null&&String(pmYr)===String(yr));
  const priorLab=showPrior?(yoy?pmLabel(pm,pmYr,yr):mf(pm)):null;
  const li=MONTHS.indexOf(lm), pi=(showPrior&&!yoy)?MONTHS.indexOf(pm):-1;
  const cats=TYPES.filter(t=>SKU_DATA[yr]&&SKU_DATA[yr][t.key]&&SKU_DATA[yr][t.key][brand]).map(t=>t.key);
  if(!cats.length)return {html:`<div class="page-head"><div class="page-title">${brand}</div>${ctrlBox(yr)}</div><div class="month-card"><div class="cat-sec">No SKU data for this brand.</div></div>`,specs};
  const chip=p=>p==null?'<span class="mom-chip xs flat">—</span>':`<span class="mom-chip xs ${p>=0?'pos':'neg'}">${p>=0?'▲':'▼'} ${signPct(p)}</span>`;
  const cell=(cur,prv,p,cls)=>`<div class="sku-v ${cls}">${showPrior?`<span class="prv">${prv}</span><span class="arr">→</span>`:''}<span class="cur">${cur}</span><span class="mm">${chip(p)}</span></div>`;
  const ml=showPrior?`<small>${priorLab} → ${mf(lm)}</small>`:'';
  const collapsible=cats.length>1;
  const sections=cats.map(cat=>{
    const list=SKU_DATA[yr][cat][brand];
    const priorList=yoy?(SKU_DATA[pmYr]?.[cat]?.[brand]||null):null;
    const priorByKey=priorList?Object.fromEntries(priorList.map(s=>[s.k,s])):null;
    const rows=list.map(s=>{
      const u=s.s[li]||0, pu=yoy?((priorByKey&&priorByKey[s.k])?(priorByKey[s.k].s[li]||0):0):(pi>=0?(s.s[pi]||0):0);
      const rev=u*s.p, prev=pu*s.p, cas=s.u?u/s.u:0, pcas=s.u?pu/s.u:0;
      return {k:s.k,d:s.d,u,pu,rev,prev,cas,pcas,
        momRev:prev>0?(rev-prev)/prev*100:null,
        momU:pu>0?(u-pu)/pu*100:null,
        momC:pcas>0?(cas-pcas)/pcas*100:null};
    }).sort((a,b)=>b.rev-a.rev);
    const sR=rows.reduce((a,r)=>a+r.rev,0), sU=rows.reduce((a,r)=>a+r.u,0), sC=rows.reduce((a,r)=>a+r.cas,0);
    const sP=rows.reduce((a,r)=>a+r.prev,0), sPU=rows.reduce((a,r)=>a+r.pu,0), sPC=rows.reduce((a,r)=>a+r.pcas,0);
    const color=catColor(cat);
    const subMomR=sP>0?(sR-sP)/sP*100:null, subMomU=sPU>0?(sU-sPU)/sPU*100:null, subMomC=sPC>0?(sC-sPC)/sPC*100:null;
    let momBox='';
    if(showPrior){
      const momCid=`btm-${brand.replace(/[^a-z0-9]/gi,'')}-${cat.replace(/[^a-z0-9]/gi,'')}`;
      const idxOf=(prev,cur)=>(prev>0&&cur!=null)?cur/prev*100:null;
      specs.push({cid:momCid,kind:'buckets',color,
        labels:['Revenue','Units','Cases'],pmName:priorLab,lmName:mf(lm),
        pmIdx:[sP>0?100:null,sPU>0?100:null,sPC>0?100:null],
        lmIdx:[idxOf(sP,sR),idxOf(sPU,sU),idxOf(sPC,sC)],
        raw:{prev:[sP,sPU,sPC],cur:[sR,sU,sC]},
        fmt:['money','n','n']});
      const cmpRow=(label,pv,cv,delta,sm,col)=>`<div class="cmp-lbl"${col?` style="color:${col}"`:''}>${label}</div><div class="cmp-v${sm?' sm':''}">${pv}</div><div class="cmp-arr">→</div><div class="cmp-v${sm?' sm':''}">${cv}</div><div class="cmp-dcell">${delta}</div>`;
      const bchip=p=>p==null?'<span class="mom-chip">—</span>':`<span class="mom-chip ${p>=0?'pos':'neg'}">${p>=0?'▲':'▼'} ${signPct(p)}</span>`;
      momBox=`<div class="mom-2col">
        <div class="mom-compare"><div class="cmp-tbl">
          <div class="cmp-h"></div><div class="cmp-h">${priorLab}</div><div class="cmp-h"></div><div class="cmp-h">${mf(lm)}</div><div class="cmp-h">Δ ${cmpLbl}</div>
          ${cmpRow('Revenue',fmtMoneyK(sP),fmtMoneyK(sR),bchip(subMomR),true,'var(--teal)')}
          ${cmpRow('Units',fmtN(sPU),fmtN(sU),bchip(subMomU),false,'var(--accent)')}
          ${cmpRow('Cases',fmtN(Math.round(sPC)),fmtN(Math.round(sC)),bchip(subMomC),true,'var(--lav)')}
        </div></div>
        <div class="mom-chartbox"><div class="mom-chart-h"><canvas id="${momCid}" role="img" aria-label="${brand} ${cat} ${priorLab} vs ${mf(lm)} indexed by bucket"></canvas></div><div class="mom-cap">Indexed to ${priorLab} = 100% · hover bars for actuals</div></div>
      </div>`;
    }
    const body=rows.map(r=>`<div class="sku-row"><div class="sku-desc">${r.d}${r.k?`<small>${r.k}</small>`:''}</div>${cell(fmtMoneyK(r.rev),fmtMoneyK(r.prev),r.momRev,'rev')}${cell(fmtN(r.u),fmtN(r.pu),r.momU,'un')}${cell(fmtN(Math.round(r.cas)),fmtN(Math.round(r.pcas)),r.momC,'cs')}</div>`).join('');
    const caret=collapsible?`<span class="mc-caret" aria-hidden="true"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>`:'';
    return `<div class="month-card${collapsible?' collapsible':''}" style="margin-bottom:16px">
      <div class="mc-head"${collapsible?' role="button" tabindex="0" aria-expanded="true"':''}><div class="mc-name">${caret}<span class="dot" style="background:${color}"></span>${cat}</div><div class="badges"><span class="tb tb-vol">${rows.length} SKU${rows.length>1?'s':''}</span><span class="tb tb-up">${fmtMoneyK(sR)} · ${mf(lm)}</span></div></div>
      <div class="cat-collapse">${momBox}
      <div class="sku-body"${momBox?' style="border-top:1px solid var(--line)"':''}><div class="sku-row head"><div>Product</div><div>Revenue${ml}</div><div>Units${ml}</div><div class="cs">Cases${ml}</div></div>${body}<div class="sku-row foot"><div class="sku-desc foot">Subtotal · ${cat}</div>${cell(fmtMoneyK(sR),fmtMoneyK(sP),subMomR,'rev foot')}${cell(fmtN(sU),fmtN(sPU),subMomU,'un foot')}${cell(fmtN(Math.round(sC)),fmtN(Math.round(sPC)),subMomC,'cs foot')}</div></div></div>
    </div>`;
  }).join('');
  const logo=BRAND_LOGOS[brand];
  const titleInner=logo?`<img class="page-logo" src="${logo}" alt="${brand} logo">`:`<span class="brand-word" style="font-size:30px">${brand}${brand==='CCHR'?'<small>Countryside Harvest Reserve</small>':''}</span>`;
  const head=`<div class="page-head"><div class="page-title">${titleInner}</div><div class="head-right">${ctrlBox(yr)}</div></div>`;
  return {html:head+sections, specs};
}

function renderNav(yr,active){
  if(isOpsPage(active)){
    let html=`<div class="nav-sec first">Operations</div>`;
    OPS_SECTIONS.forEach(s=>{
      const pg='ops:'+s.key;
      html+=`<button class="nav-item${active===pg?' active':''}" data-page="${pg}"><span class="ni-name">${s.name}</span></button>`;
    });
    document.getElementById('nav').innerHTML=html;
    return;
  }
  if(isPlanningPage(active)){
    let html=`<div class="nav-sec first">Schedules</div>`;
    PROD_SITES.forEach(s=>{
      const pg='planning:prod:'+s.key;
      html+=`<button class="nav-item${active===pg?' active':''}" data-page="${pg}"><span class="ni-name">${s.name}</span></button>`;
    });
    html+=`<div class="nav-sec">Procurement</div>`;
    PLANNING_SECTIONS.forEach(s=>{
      const pg='planning:'+s.key;
      html+=`<button class="nav-item${active===pg?' active':''}" data-page="${pg}"><span class="ni-name">${s.name}</span></button>`;
    });
    document.getElementById('nav').innerHTML=html;
    return;
  }
  const cm=completeMonths(yr);
  let html=`<div class="nav-sec first">Overview</div>`;
  html+=`<button class="nav-item${active==='overview'?' active':''}" data-page="overview"><span class="ni-name">Executive Summary</span></button>`;
  html+=`<button class="nav-item${active==='crystal'?' active':''}" data-page="crystal"><span class="ni-name">Crystal Ball</span></button>`;
  html+=`<div class="nav-sec">Categories</div>`;
  TYPES.forEach(t=>{
    html+=`<button class="nav-item${active===t.key?' active':''}" data-page="${t.key}"><span class="ni-name"><span class="dot" style="background:${catColor(t.key)}"></span>${t.key}</span></button>`;
  });
  if(typeof SKU_DATA!=='undefined'&&SKU_DATA[yr]){
    const li=MONTHS.indexOf(cm[cm.length-1]);
    const rev={};
    TYPES.forEach(t=>{const m=SKU_DATA[yr][t.key];if(m)Object.keys(m).forEach(b=>{let r=rev[b]||0;m[b].forEach(s=>r+=(s.s[li]||0)*s.p);rev[b]=r;});});
    const brands=Object.keys(rev).sort((a,b)=>rev[b]-rev[a]);
    if(brands.length){
      html+=`<div class="nav-sec">Brands</div>`;
      brands.forEach(b=>{
        const logo=BRAND_LOGOS[b];
        const label=logo?`<img class="ni-logo" src="${logo}" alt="${b}">`:`<span class="ni-word">${b}</span>`;
        const pg='brand:'+b;
        html+=`<button class="nav-item${active===pg?' active':''}" data-page="${pg}"><span class="ni-name">${label}</span></button>`;
      });
    }
  }
  document.getElementById('nav').innerHTML=html;
}

function showPage(yr,page){
  charts.forEach(c=>c.destroy());charts.length=0;
  refreshChartTokens();
  if(cmpMode==='yoy'&&completeMonths(String(Number(yr)-1)).length===0)cmpMode='mom'; // no prior year to compare against
  if(cmpMode==='fcst'&&page.slice(0,6)==='brand:')cmpMode='mom'; // forecast is category-level; SKU data has no plan
  const main=document.getElementById('main');
  const r= page==='overview'?buildOverview(yr):page==='planning:flower'?buildFlowerSchedule(yr):page.slice(0,14)==='planning:prod:'?buildProductionSchedule(yr,page.slice(14)):isOpsPage(page)?buildOperations(yr,page):page==='crystal'?buildCrystal(yr):page.slice(0,6)==='brand:'?buildBrand(yr,page.slice(6)):buildCategory(yr,page);
  main.innerHTML=r.html;
  (r.specs||[]).forEach(s=>charts.push(s.kind==='spark'?makeSpark(s):s.kind==='group'?makeGroup(s):s.kind==='flower'?makeFlower(s):s.kind==='buckets'?makeMomBuckets(s):s.kind==='crystal'?makeCrystal(s):makeChart(s.cid,s.labels,s.vals,s.bg,s.bd)));
  document.querySelectorAll('#nav .nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  curPage=page;
  if(isOpsPage(page))lastOps=page; else if(isPlanningPage(page))lastPlanning=page; else lastSales=page;
  syncCmpUI();
  syncModeUI();
  window.scrollTo(0,0);
}
// Reflect comparison-mode availability + selection in the header toggle (YoY needs a prior year; hide the toggle on the overview).
function syncCmpUI(){
  const noCtrl=curPage==='overview'||curPage==='crystal'||isPlanningPage(curPage)||isOpsPage(curPage); // pages with no comparison toggle / inert export
  const es=document.getElementById('exportSlot');
  if(es)es.classList.toggle('hidden',noCtrl);
  const cg=document.getElementById('cmpGroup');
  if(!cg)return;
  const hasPrev=completeMonths(String(Number(curYr)-1)).length>0;

  const fcstBtn=cg.querySelector('[data-cmp="fcst"]');

  [...cg.querySelectorAll('.seg')].forEach((p,i)=>{const on=p.dataset.cmp===cmpMode;p.classList.toggle('active',on);if(on)cg.style.setProperty('--i',i);});

}
// Reflect the active mode (Sales / Operations / Planning) in the header segmented switch.

function render(yr){
  curYr=yr;
  document.getElementById('footnote').innerHTML=
    `Source: SharePoint “Forecast vs Actual” workbook (03. Operations / 08. Planning) · units, revenue ($) &amp; cases summed from SKU-level columns per product sheet, across five categories. `+
    `Revenue ($) &amp; cases are reported directly for 2026; the 2025 sheets carry units only, so 2025 $ is estimated at 2026 SKU prices and cases derived from 2026 pack sizes. `+
    `Forecast cells that are broken source formulas (negligible or far below actuals) are treated as missing and shown as “—”. `+
    (yr==2026?`June 2026 is mid-month and excluded from YTD attainment.`:`2025 forecast coverage is partial; months without a plan show actuals only.`);
  let page=curPage;
  if(page==='operations')page='ops:'+OPS_SECTIONS[0].key; // normalize the bare mode value to its first section page
  if(page==='planning')page='planning:'+PLANNING_SECTIONS[0].key;
  if(page!=='overview'&&!isOpsPage(page)&&!isPlanningPage(page)){
    if(page.slice(0,6)==='brand:'){
      const bn=page.slice(6);
      if(typeof SKU_DATA==='undefined' || !TYPES.some(t=>SKU_DATA[yr]&&SKU_DATA[yr][t.key]&&SKU_DATA[yr][t.key][bn])) page='overview';
    } else if(page!=='crystal'&&!TYPES.some(t=>t.key===page)) page='overview';
  }
  renderNav(yr,page);
  showPage(yr,page);
}

function openSku(cat,brand){
  if(typeof SKU_DATA==='undefined')return;
  const list=SKU_DATA[curYr]&&SKU_DATA[curYr][cat]&&SKU_DATA[curYr][cat][brand];
  if(!list||!list.length)return;
  const cm=completeMonths(curYr);
  const {lm,pm,pmYr,mode}=cmpPair(cm,curYr);
  const yoy=mode==='yoy'&&pm!=null;
  const showPrior=yoy?true:(pm!=null&&String(pmYr)===String(curYr)); // SKU prior only when we have a comparable prior series
  const priorLab=showPrior?(yoy?pmLabel(pm,pmYr,curYr):mf(pm)):null;
  const priorList=yoy?(SKU_DATA[pmYr]?.[cat]?.[brand]||null):null;
  const priorByKey=priorList?Object.fromEntries(priorList.map(s=>[s.k,s])):null;
  const li=MONTHS.indexOf(lm), pi=(showPrior&&!yoy)?MONTHS.indexOf(pm):-1;
  const rows=list.map(s=>{
    const u=s.s[li]||0, pu=yoy?((priorByKey&&priorByKey[s.k])?(priorByKey[s.k].s[li]||0):0):(pi>=0?(s.s[pi]||0):0);
    const rev=u*s.p, prev=pu*s.p, cas=s.u?u/s.u:0, pcas=s.u?pu/s.u:0;
    return {k:s.k,d:s.d,u,pu,rev,prev,cas,pcas,
      momRev:prev>0?(rev-prev)/prev*100:null,
      momU:pu>0?(u-pu)/pu*100:null,
      momC:pcas>0?(cas-pcas)/pcas*100:null};
  }).filter(r=>r.u>0||r.pu>0).sort((a,b)=>b.rev-a.rev);
  const tU=rows.reduce((a,r)=>a+r.u,0), tR=rows.reduce((a,r)=>a+r.rev,0), tC=rows.reduce((a,r)=>a+r.cas,0);
  const tPU=rows.reduce((a,r)=>a+r.pu,0), tPrev=rows.reduce((a,r)=>a+r.prev,0), tPC=rows.reduce((a,r)=>a+r.pcas,0);
  const tMomR=tPrev>0?(tR-tPrev)/tPrev*100:null, tMomU=tPU>0?(tU-tPU)/tPU*100:null, tMomC=tPC>0?(tC-tPC)/tPC*100:null;
  const chip=p=>p==null?'<span class="mom-chip xs flat">—</span>':`<span class="mom-chip xs ${p>=0?'pos':'neg'}">${p>=0?'▲':'▼'} ${signPct(p)}</span>`;
  const cell=(cur,prv,p,cls)=>`<div class="sku-v ${cls}">${showPrior?`<span class="prv">${prv}</span><span class="arr">→</span>`:''}<span class="cur">${cur}</span><span class="mm">${chip(p)}</span></div>`;
  const logo=BRAND_LOGOS[brand];
  const cap=logo
    ? `<span class="cap"><img src="${logo}" alt="${brand} logo"></span>`
    : `<span class="cap"><span class="brand-word">${brand}${brand==='CCHR'?'<small>Countryside Harvest Reserve</small>':''}</span></span>`;
  const body=rows.map(r=>`<div class="sku-row"><div class="sku-desc">${r.d}${r.k?`<small>${r.k}</small>`:''}</div>${cell(fmtMoneyK(r.rev),fmtMoneyK(r.prev),r.momRev,'rev')}${cell(fmtN(r.u),fmtN(r.pu),r.momU,'un')}${cell(fmtN(Math.round(r.cas)),fmtN(Math.round(r.pcas)),r.momC,'cs')}</div>`).join('');
  const ml=showPrior?`<small>${priorLab} → ${mf(lm)}</small>`:'';
  skuOv.querySelector('.sku-modal').innerHTML=`<div class="sku-head">${cap}<div class="sku-titles"><div class="sku-cat">${brand}</div><div class="sku-sub">${cat} · ${rows.length} SKU${rows.length>1?'s':''} · ${mf(lm)} ${curYr}${showPrior?' vs '+priorLab:''}</div></div><button class="sku-close" aria-label="Close">✕</button></div><div class="sku-body"><div class="sku-row head"><div>Product</div><div>Revenue${ml}</div><div>Units${ml}</div><div class="cs">Cases${ml}</div></div>${body}<div class="sku-row foot"><div class="sku-desc foot">Total · ${brand}</div>${cell(fmtMoneyK(tR),fmtMoneyK(tPrev),tMomR,'rev foot')}${cell(fmtN(tU),fmtN(tPU),tMomU,'un foot')}${cell(fmtN(Math.round(tC)),fmtN(Math.round(tPC)),tMomC,'cs foot')}</div></div>`;
  skuOv.querySelector('.sku-close').addEventListener('click',closeSku);
  skuOv.classList.add('open');
  document.body.style.overflow='hidden';
}

  if(cap)openSku(cap.dataset.cat,cap.dataset.brand);

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&skuOv.classList.contains('open')){closeSku();return;}
  if(e.key==='Enter'||e.key===' '){
    const cap=e.target.closest&&e.target.closest('.brand-cap[data-cat]');
    if(cap){e.preventDefault();openSku(cap.dataset.cat,cap.dataset.brand);}
  }
});

/* ---------- data export: Excel (.xlsx) + PDF (print) ---------- */
const XLS_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13l6 5M15 13l-6 5"/></svg>';
const PDF_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h2a1.5 1.5 0 0 1 0 3H8zM8 16v-3M13 13v3h1.2M13 14.5h1.6M17.5 13H19M17.5 13v3M17.5 14.5h1.3"/></svg>';
function exportBox(){
  return `<div class="exp-box" role="group" aria-label="Export this page">`+
    `<button type="button" class="exp-btn" data-export="excel" title="Download as Excel (.xlsx)" aria-label="Download as Excel">${XLS_SVG}<span>Excel</span></button>`+
    `<button type="button" class="exp-btn" data-export="pdf" title="Print / save as PDF" aria-label="Print or save as PDF">${PDF_SVG}<span>PDF</span></button>`+
  `</div>`;
}

// HTML-escape for the print surface.
function _esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Cell renderers. Money is redacted to '•••' while the cash lock is on.
function fmtCellXlsx(v,fmt){
  if(v==null||v==='')return '';
  if(fmt==='money')return CASH_LOCKED?'•••':{v:Math.round(v),t:'n'};
  if(fmt==='int')return {v:Math.round(v),t:'n'};
  if(fmt==='pct')return (v>=0?'+':'')+Math.round(v)+'%';
  return String(v);
}
function fmtCellHtml(v,fmt){
  if(v==null||v==='')return '—';
  if(fmt==='money')return CASH_LOCKED?'•••':'$'+Math.round(v).toLocaleString();
  if(fmt==='int')return Math.round(v).toLocaleString();
  if(fmt==='pct')return (v>=0?'+':'')+Math.round(v)+'%';
  return String(v);
}

// Build the export model (columns + raw rows) for the active category or brand page.
function catExportModel(yr,catKey){
  const nav=navMonths(yr), cm=completeMonths(yr), showYoY=yr==2026;
  let hasD=false,hasC=false;
  cm.forEach(m=>{const d=DATA[yr][catKey][m];if(d){if(d.d!=null)hasD=true;if(d.c!=null)hasC=true;}});
  const showDC=hasD||hasC;
  const cols=[{label:'Month',fmt:'text'},{label:'Sold (units)',fmt:'int'}];
  if(showDC){cols.push({label:'Revenue ($)',fmt:'money'},{label:'Cases',fmt:'int'});}
  cols.push({label:'Forecast (units)',fmt:'int'},{label:'vs Forecast',fmt:'pct'},{label:'MoM',fmt:'pct'});
  if(showYoY)cols.push({label:'YoY vs ’25',fmt:'pct'});
  const rows=nav.map((m,i)=>{
    const d=DATA[yr][catKey][m]||{f:0,s:0};
    const tHasF=hasF(yr,catKey,m);
    const tAtt=tHasF&&d.f>0?d.s/d.f:null, tAcc=tAtt!=null?(tAtt-1)*100:null;
    const prevM=i>0?nav[i-1]:null, prevS=prevM?(DATA[yr][catKey][prevM]?.s||0):null;
    const tMom=prevS!=null&&prevS>0?(d.s-prevS)/prevS*100:null;
    const t25=showYoY?(DATA[2025]?.[catKey]?.[m]?.s??null):null;
    const tYoY=t25!=null&&t25>0?(d.s-t25)/t25*100:null;
    const row=[mf(m)+(STATUS[yr][m]==='p'?' (live)':''),d.s];
    if(showDC){row.push(d.d,d.c);}
    row.push(tHasF?d.f:null,tAcc,tMom);
    if(showYoY)row.push(tYoY);
    return row;
  });
  let tS=0,tD=0,tC=0,tF=0,anyD=false,anyC=false;
  cm.forEach(m=>{const d=DATA[yr][catKey][m];if(d){tS+=d.s;if(d.d!=null){tD+=d.d;anyD=true;}if(d.c!=null){tC+=d.c;anyC=true;}if(hasF(yr,catKey,m))tF+=d.f;}});
  const tot=['Total · YTD',tS];
  if(showDC){tot.push(anyD?tD:null,anyC?tC:null);}
  tot.push(tF||null,null,null);
  if(showYoY)tot.push(null);
  return {title:catKey+' · '+yr,subtitle:'Monthly breakdown · '+cm.length+' complete months',
    filename:'Mera_'+catKey.replace(/[^A-Za-z0-9]+/g,'-')+'_'+yr,sheet:catKey,cols,rows,totals:[tot]};
}
function brandExportModel(yr,brand){
  const cm=completeMonths(yr), {lm}=cmpPair(cm,yr), li=MONTHS.indexOf(lm);
  const cats=TYPES.filter(t=>SKU_DATA[yr]&&SKU_DATA[yr][t.key]&&SKU_DATA[yr][t.key][brand]).map(t=>t.key);
  const cols=[{label:'Category',fmt:'text'},{label:'SKU',fmt:'text'},{label:'Product',fmt:'text'},
    {label:'Units',fmt:'int'},{label:'Revenue ($)',fmt:'money'},{label:'Cases',fmt:'int'},{label:'Unit Price ($)',fmt:'money'}];
  const rows=[]; let gU=0,gR=0,gC=0;
  cats.forEach(cat=>{
    SKU_DATA[yr][cat][brand].map(s=>{
      const u=s.s[li]||0;
      return {k:s.k,d:s.d,u,rev:u*s.p,cas:s.u?u/s.u:0,p:s.p};
    }).sort((a,b)=>b.rev-a.rev).forEach(r=>{
      gU+=r.u; gR+=r.rev; gC+=r.cas;
      rows.push([cat,r.k,r.d,r.u,r.rev,r.cas,r.p]);
    });
  });
  return {title:brand+' · '+yr,subtitle:'SKU detail · '+mf(lm)+' '+yr,
    filename:'Mera_'+brand.replace(/[^A-Za-z0-9]+/g,'-')+'_'+yr,sheet:brand,cols,rows,
    totals:[['Total','','',gU,gR,gC,null]]};
}
function currentExportModel(){
  const yr=curYr,page=curPage;
  if(!page||page==='overview')return null;
  if(page.slice(0,6)==='brand:'){const b=page.slice(6);return (TYPES.some(t=>SKU_DATA[yr]&&SKU_DATA[yr][t.key]&&SKU_DATA[yr][t.key][b]))?brandExportModel(yr,b):null;}
  if(TYPES.some(t=>t.key===page))return catExportModel(yr,page);
  return null;
}

function _download(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=name;document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},0);
}
function exportExcel(){
  const model=currentExportModel(); if(!model)return;
  const aoa=[[model.title],['Source: Mera Cannabis · Forecast vs Actual'+(CASH_LOCKED?' · $ hidden (•••)':'')],['Exported '+new Date().toISOString().slice(0,10)],[],model.cols.map(c=>c.label)];
  model.rows.forEach(r=>aoa.push(r.map((v,ci)=>fmtCellXlsx(v,model.cols[ci].fmt))));
  (model.totals||[]).forEach(r=>aoa.push(r.map((v,ci)=>fmtCellXlsx(v,model.cols[ci].fmt))));
  const bytes=buildXlsx(aoa,model.sheet);
  _download(new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),model.filename+'.xlsx');
}
function renderPrintArea(model){
  const pa=document.getElementById('printArea'); if(!pa)return;
  const sub=(model.subtitle||'')+(CASH_LOCKED?' · $ figures hidden':'');
  const thead='<tr>'+model.cols.map(c=>`<th class="c-${c.fmt}">${_esc(c.label)}</th>`).join('')+'</tr>';
  const rowHtml=(r,foot)=>`<tr${foot?' class="pa-foot"':''}>`+r.map((v,ci)=>`<td class="c-${model.cols[ci].fmt}">${_esc(fmtCellHtml(v,model.cols[ci].fmt))}</td>`).join('')+'</tr>';
  const tbody=model.rows.map(r=>rowHtml(r,false)).join('')+(model.totals||[]).map(r=>rowHtml(r,true)).join('');
  pa.innerHTML=`<div class="pa-title">${_esc(model.title)}</div><div class="pa-sub">${_esc(sub)}</div><table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
}
function exportPDF(){
  const model=currentExportModel(); if(!model)return;
  renderPrintArea(model);
  const cleanup=()=>{document.body.classList.remove('printing');window.removeEventListener('afterprint',cleanup);};
  window.addEventListener('afterprint',cleanup);
  document.body.classList.add('printing');
  window.print();
  setTimeout(()=>{if(document.body.classList.contains('printing'))cleanup();},2000);
}
document.addEventListener('click',e=>{
  const b=e.target.closest&&e.target.closest('.exp-btn[data-export]');
  if(!b)return;
  if(b.dataset.export==='excel')exportExcel();
  else if(b.dataset.export==='pdf')exportPDF();
});

/* ---------- dependency-free .xlsx (stored-ZIP, CRC32) writer ---------- */
function _x_u8(str){return new TextEncoder().encode(str);}
function _x_xmlEsc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function _x_colName(i){let s='';i++;while(i>0){let r=(i-1)%26;s=String.fromCharCode(65+r)+s;i=(i-r-1)/26;}return s;}
function _x_crc32(u8){let c,crc=0xFFFFFFFF;for(let n=0;n<u8.length;n++){c=(crc^u8[n])&0xFF;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);crc=(crc>>>8)^c;}return (crc^0xFFFFFFFF)>>>0;}
function _x_cellXml(ref,cell){
  if(cell==null||cell==='')return '<c r="'+ref+'"/>';
  const isNum=(typeof cell==='object')?cell.t==='n':(typeof cell==='number');
  const val=(typeof cell==='object')?cell.v:cell;
  if(isNum)return '<c r="'+ref+'"><v>'+val+'</v></c>';
  return '<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+_x_xmlEsc(val)+'</t></is></c>';
}
function _x_sheetXml(aoa){
  let rows='';
  for(let r=0;r<aoa.length;r++){
    let cells='';
    for(let ci=0;ci<aoa[r].length;ci++)cells+=_x_cellXml(_x_colName(ci)+(r+1),aoa[r][ci]);
    rows+='<row r="'+(r+1)+'">'+cells+'</row>';
  }
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>'+rows+'</sheetData></worksheet>';
}
function _x_zip(files){
  const chunks=[],central=[]; let offset=0;
  const num=(n,b)=>{const a=[];for(let i=0;i<b;i++){a.push(n&0xFF);n>>>=8;}return a;};
  for(const f of files){
    const nameU8=_x_u8(f.name), crc=_x_crc32(f.data);
    const local=[].concat(num(0x04034b50,4),num(20,2),num(0,2),num(0,2),num(0,2),num(0,2),num(crc,4),num(f.data.length,4),num(f.data.length,4),num(nameU8.length,2),num(0,2));
    const localHead=new Uint8Array(local);
    chunks.push(localHead,nameU8,f.data);
    const cen=[].concat(num(0x02014b50,4),num(20,2),num(20,2),num(0,2),num(0,2),num(0,2),num(0,2),num(crc,4),num(f.data.length,4),num(f.data.length,4),num(nameU8.length,2),num(0,2),num(0,2),num(0,2),num(0,2),num(0,4),num(offset,4));
    central.push({head:new Uint8Array(cen),name:nameU8});
    offset+=localHead.length+nameU8.length+f.data.length;
  }
  const centralStart=offset; let centralSize=0;
  for(const c of central){chunks.push(c.head,c.name);centralSize+=c.head.length+c.name.length;}
  chunks.push(new Uint8Array([].concat(num(0x06054b50,4),num(0,2),num(0,2),num(files.length,2),num(files.length,2),num(centralSize,4),num(centralStart,4),num(0,2))));
  let total=0;for(const c of chunks)total+=c.length;
  const out=new Uint8Array(total); let p=0;
  for(const c of chunks){out.set(c,p);p+=c.length;}
  return out;
}
function buildXlsx(aoa,sheetName){
  sheetName=(sheetName||'Sheet1').slice(0,31).replace(/[\\\/\?\*\[\]:]/g,'_');
  const contentTypes='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>';
  const rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
  const workbook='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="'+_x_xmlEsc(sheetName)+'" sheetId="1" r:id="rId1"/></sheets></workbook>';
  const wbRels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>';
  return _x_zip([
    {name:'[Content_Types].xml',data:_x_u8(contentTypes)},
    {name:'_rels/.rels',data:_x_u8(rels)},
    {name:'xl/workbook.xml',data:_x_u8(workbook)},
    {name:'xl/_rels/workbook.xml.rels',data:_x_u8(wbRels)},
    {name:'xl/worksheets/sheet1.xml',data:_x_u8(_x_sheetXml(aoa))}
  ]);
}

{const _es=document.getElementById('exportSlot');if(_es)_es.innerHTML=exportBox();}
render('2026');
</script>
